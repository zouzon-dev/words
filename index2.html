<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字四選一測驗系統（自動發音與錯題複習版）</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #1a1a1a; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; }
        
        .selector-group {
            margin: 15px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fdfdfd;
            padding: 10px;
            border-radius: 4px;
            border: 1px dashed #cbd5e1;
        }
        select {
            padding: 8px 12px;
            font-size: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            outline: none;
            flex: 1;
        }

        .mode-badge {
            display: none;
            background-color: #ffeaa7;
            color: #d63031;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }

        .question-box { font-size: 32px; font-weight: bold; margin: 20px 0; color: #2c3e50; text-align: center; letter-spacing: 0.5px; }
        
        /* 選擇題按鈕群組 */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 25px 0;
        }
        
        .option-btn {
            padding: 14px 20px;
            font-size: 18px;
            background-color: #f8fafc;
            color: #334155;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) {
            background-color: #f1f5f9;
            border-color: #cbd5e1;
        }
        /* 正確與錯誤的視覺視覺回饋 */
        .option-btn.btn-correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
        }
        .option-btn.btn-wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        button.btn-main {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button.btn-main:hover { background-color: #2980b9; }
        button.btn-audio { background-color: #2ecc71; }
        button.btn-audio:hover { background-color: #27ae60; }
        button.btn-review { background-color: #e67e22; }
        button.btn-review:hover { background-color: #d35400; }
        
        .result { margin-top: 20px; font-size: 18px; font-weight: bold; min-height: 27px; text-align: center; }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
        .score-board { margin-top: 20px; font-size: 14px; color: #555; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h2>英文單字測驗（聽力與四選一版）</h2>
    
    <div class="selector-group" id="selector-wrapper">
        <label for="db-select"><strong>選擇單字庫：</strong></label>
        <select id="db-select" onchange="loadWords()">
            <option value="data.json">預設單字庫 (data.json)</option>
            <option value="data2.json">進階單字庫 (data2.json)</option>
            <option value="data3.json">自訂測試庫 (data3.json)</option>
        </select>
    </div>

    <div id="review-badge" class="mode-badge">⚠️ 正在進行【錯題本】複習模式</div>

    <div id="quiz-section">
        <div class="score-board">
            <span id="progress">進度：0 / 0</span>
            <span id="score">即時正確率：0%</span>
        </div>
        
        <!-- 英文題目區 -->
        <div class="question-box" id="question">載入中...</div>
        
        <div style="text-align: center; margin-bottom: 15px;">
            <button class="btn-main btn-audio" id="audio-btn" onclick="speakCurrentWord()">🔊 重讀發音</button>
        </div>

        <!-- 四個中文選項按鈕 -->
        <div class="options-group" id="options-container">
            <!-- 按鈕將由 JavaScript 動態產生 -->
        </div>

        <div id="result-message" class="result"></div>
    </div>
</div>

<script>
    let globalOriginalList = []; // 保存最原始載入的完整單字庫（用於抓取干擾選項）
    let wordList = [];        
    let failedWords = [];     
    let currentIndex = 0;
    let correctCount = 0;
    let attemptedCount = 0;
    let isReviewMode = false; 
    let isLocking = false;     // 防連擊鎖定狀態鎖

    async function loadWords() {
        document.getElementById('question').innerText = "正在載入單字庫...";
        document.getElementById('options-container').innerHTML = '';
        document.getElementById('result-message').innerText = '';
        document.getElementById('review-badge').style.display = 'none';
        isReviewMode = false;
        isLocking = false;

        const selectedFile = document.getElementById('db-select').value; 

        try {
            const response = await fetch(selectedFile); 
            if (!response.ok) throw new Error(`找不到檔案：${selectedFile}`);
            
            const data = await response.json();
            globalOriginalList = [...data]; // 留底備用
            wordList = [...data];
            wordList.sort(() => Math.random() - 0.5); 
            
            failedWords = []; 
            initQuiz();
        } catch (error) {
            document.getElementById('question').innerHTML = `<span class="error">載入失敗: ${error.message}</span>`;
            document.getElementById('progress').innerText = `進度：0 / 0`;
            document.getElementById('score').innerText = `即時正確率：0%`;
        }
    }

    function initQuiz() {
        currentIndex = 0;
        correctCount = 0;
        attemptedCount = 0;
        isLocking = false;
        document.getElementById('score').innerText = `即時正確率：0%`;
        showQuestion();
    }

    function showQuestion() {
        if (wordList.length === 0) return;

        if (currentIndex >= wordList.length) {
            showSummary();
            return;
        }

        isLocking = false;
        const currentWord = wordList[currentIndex];
        
        // 顯示英文題目
        document.getElementById('question').innerText = currentWord.en;
        document.getElementById('result-message').innerText = '';
        document.getElementById('progress').innerText = `進度：${currentIndex + 1} / ${wordList.length}`;
        
        // 生成四個選項
        generateOptions(currentWord);

        // 新增：切換到新題目時，自動為使用者朗讀英文
        speakCurrentWord();
    }

    // 動態產生隨機干擾中文選項
    function generateOptions(currentWord) {
        const container = document.getElementById('options-container');
        container.innerHTML = '';

        // 1. 先把正確答案塞進去
        let options = [currentWord.ch];

        // 2. 從備用庫撈其他不重複的中文字當作干擾項
        let wrongCandidates = globalOriginalList
            .filter(item => item.ch !== currentWord.ch)
            .map(item => item.ch);

        // 洗牌候選錯題，挑出 3 個
        wrongCandidates.sort(() => Math.random() - 0.5);
        for (let i = 0; i < Math.min(3, wrongCandidates.length); i++) {
            options.push(wrongCandidates[i]);
        }

        // 如果題庫總數太少湊不滿 4 個選項，補齊防呆
        while (options.length < 4) {
            options.push("（無其他選項）");
        }

        // 3. 將包含正確與錯誤的 4 個選項再次隨機排序
        options.sort(() => Math.random() - 0.5);

        // 4. 生成 HTML 按鈕
        options.forEach(optText => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optText;
            btn.onclick = () => selectOption(btn, optText, currentWord.ch);
            container.appendChild(btn);
        });
    }

    function selectOption(clickedBtn, selectedText, correctText) {
        if (isLocking) return;
        isLocking = true; // 鎖定 UI，啟動兩秒防連擊機制

        attemptedCount++;
        const resultMsg = document.getElementById('result-message');
        const allButtons = document.querySelectorAll('.option-btn');
        
        // 停用所有按鈕，不允許重複點擊
        allButtons.forEach(btn => btn.disabled = true);

        // 檢查是否答對
        if (selectedText === correctText) {
            correctCount++;
            clickedBtn.classList.add('btn-correct');
            resultMsg.className = "result success";
            resultMsg.innerText = "⭕ 正確！";
            
            updateScoreBoard();
            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 2000);
        } else {
            // 答錯處理
            clickedBtn.classList.add('btn-wrong');
            resultMsg.className = "result error";
            resultMsg.innerText = `❌ 答錯了！正確答案是：「${correctText}」`;

            // 將答錯的單字丟進錯題本（不重複塞入）
            const currentWord = wordList[currentIndex];
            const alreadyExists = failedWords.some(item => item.en.toLowerCase() === currentWord.en.toLowerCase());
            if (!alreadyExists) {
                failedWords.push(currentWord);
            }

            updateScoreBoard();
            // 答錯時多停留 0.5 秒（共 2.5 秒）供使用者加深正確答案的印象
            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 2500);
        }
    }

    function updateScoreBoard() {
        document.getElementById('score').innerText = `即時正確率：${Math.round((correctCount / attemptedCount) * 100)}%`;
    }

    function showSummary() {
        const quizSection = document.getElementById('quiz-section');
        document.getElementById('result-message').innerText = '';

        let titleText = isReviewMode ? "🎉 錯題本複習完成！" : "🎉 本卷測驗完成！";
        let htmlContent = `
            <h3 class="success" style="text-align:center; font-size:22px;">${titleText}</h3>
            <p style="font-size:16px; text-align:center;">得分表現：答對 ${correctCount} 題 / 共 ${wordList.length} 題</p>
            <p style="font-size:16px; text-align:center; margin-bottom: 25px;">答對率：${Math.round((correctCount / wordList.length) * 100)}%</p>
        `;

        if (failedWords.length > 0) {
            htmlContent += `
                <div style="background: #fff3cd; padding: 15px; border-radius: 6px; border: 1px solid #ffeeba; margin: 15px 0; text-align:center;">
                    <p style="margin: 0 0 12px 0; color: #856404; font-weight:bold;">⚠️ 目前錯題本中累積了 ${failedWords.length} 個錯題。</p>
                    <button class="btn-main btn-review" onclick="startReviewMode()">🎯 重新挑戰錯題本</button>
                </div>
            `;
        } else {
            htmlContent += `<p class="success" style="font-weight:bold; text-align:center; font-size:18px;">✨ 太強了！沒有任何錯題！</p>`;
        }

        htmlContent += `<div style="text-align:center; margin-top:15px;"><button class="btn-main" onclick="resetToOriginalQuiz()">重新挑戰整卷</button></div>`;
        quizSection.innerHTML = htmlContent;
    }

    function startReviewMode() {
        wordList = [...failedWords]; 
        failedWords = []; 
        isReviewMode = true;
        document.getElementById('review-badge').style.display = 'block';
        restoreQuizUI();
        initQuiz();
    }

    function resetToOriginalQuiz() {
        loadWords(); 
    }

    function restoreQuizUI() {
        document.getElementById('quiz-section').innerHTML = `
            <div class="score-board">
                <span id="progress">進度：0 / 0</span>
                <span id="score">即時正確率：0%</span>
            </div>
            <div class="question-box" id="question">載入中...</div>
            <div style="text-align: center; margin-bottom: 15px;">
                <button class="btn-main btn-audio" id="audio-btn" onclick="speakCurrentWord()">🔊 重讀發音</button>
            </div>
            <div class="options-group" id="options-container"></div>
            <div id="result-message" class="result"></div>
        `;
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }

    function speakCurrentWord() {
        if (wordList[currentIndex]) {
            speak(wordList[currentIndex].en);
        }
    }

    window.onload = loadWords;
</script>

</body>
</html>
