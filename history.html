<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷史作答紀錄與錯題查閱</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none;
        }
        h2 { 
            margin-top: 0; 
            color: #1a1a1a; 
            border-bottom: 2px solid #eaeaea; 
            padding-bottom: 10px;
        }
        
        .user-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e2e8f0;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .btn-logout { background-color: #ef4444; padding: 4px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer;}
        
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-nav {
            background-color: #3498db; color: white; padding: 10px 15px; border: none;
            border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold;
        }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 15px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        th { background-color: #f8fafc; color: #475569; }
        tr.main-row:hover { background-color: #f8fafc; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; color: white; display: inline-block; }
        .badge-spelling { background-color: #9b59b6; }
        .badge-choice { background-color: #34495e; }

        .rate-high { color: #27ae60; font-weight: bold; }
        .rate-mid { color: #f39c12; font-weight: bold; }
        .rate-low { color: #c0392b; font-weight: bold; }

        /* 錯題按鈕 */
        .btn-wrong-spec {
            background-color: #e74c3c; color: white; border: none; padding: 5px 10px;
            font-size: 13px; border-radius: 4px; cursor: pointer; font-weight: bold;
        }
        .btn-wrong-spec:hover { background-color: #c0392b; }
        
        /* 展開區塊 */
        .details-row { display: none; background-color: #fef5f5; }
        .details-container { padding: 15px; border: 1px solid #fadbd8; border-radius: 4px; }
        
        /* 錯題標籤與星號優化 */
        .wrong-word-tag {
            display: inline-flex;
            align-items: center;
            background: white;
            border: 1px solid #f1948a;
            padding: 6px 14px;
            margin: 5px;
            border-radius: 20px;
            font-size: 14px;
            gap: 6px;
        }
        .wrong-word-tag b { color: #c0392b; }
        
        .btn-star {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            margin-left: 4px;
            line-height: 1;
            transition: transform 0.1s ease;
        }
        .btn-star:hover {
            transform: scale(1.2);
        }
        .star-active { color: #f1c40f; }
        .star-inactive { color: #ccc; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container" id="app-container">
    <h2>📊 歷史作答紀錄與錯題分析</h2>
    
    <div id="user-bar" class="user-info-bar">
        <span>👤 帳號：<span id="user-email-display">載入中...</span></span>
        <button id="logout-btn" class="btn-logout">登出</button>
    </div>

    <div class="nav-buttons">
        <a href="word_test.html" class="btn-nav">✍️ 前往拼字測驗</a>
        <a href="word_choose_chinese.html" class="btn-nav" style="background-color: #2ecc71;">🧩 前往選擇測驗</a>
    </div>

    <table id="logs-table">
        <thead>
            <tr>
                <th>測驗類型</th>
                <th>單字分類</th>
                <th>得分表現</th>
                <th>正確率</th>
                <th>時間 / 耗時</th>
                <th>錯題內容</th>
            </tr>
        </thead>
        <tbody id="logs-tbody">
            <tr>
                <td colspan="6" style="text-align: center; padding: 30px; color: #64748b;">正在從雲端抓取您的學習歷程...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    
    let supabaseClient = null;
    let currentUser = null;

    window.onload = async function() {
        if (typeof window.supabase === 'undefined') { return; }
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user) {
            currentUser = session.user;
            document.getElementById('user-email-display').innerText = currentUser.email;
            document.getElementById('app-container').style.display = 'block';
            document.getElementById('logout-btn').addEventListener('click', () => {
                supabaseClient.auth.signOut().then(() => window.location.href = 'login.html');
            });
            await fetchAndRenderLogs();
        } else {
            window.location.href = 'login.html';
        }
    };

    async function fetchAndRenderLogs() {
        const tbody = document.getElementById('logs-tbody');
        const { data: logs, error } = await supabaseClient
            .from('quiz_logs')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('end_time', { ascending: false });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="6" style="color:red; text-align:center;">讀取失敗: ${error.message}</td></tr>`;
            return;
        }
        if (!logs || logs.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:30px; color:#94a3b8;">📭 目前尚無作答紀錄。</td></tr>`;
            return;
        }

        tbody.innerHTML = '';

        logs.forEach((log, index) => {
            const mainTr = document.createElement('tr');
            mainTr.className = 'main-row';

            // 1. 類型
            let typeBadge = log.quiz_type === 'spelling' ? `<span class="badge badge-spelling">拼字測驗</span>` : `<span class="badge badge-choice">四選一</span>`;
            
            // 2. 正確率
            let rateClass = log.accuracy_rate >= 80 ? 'rate-high' : (log.accuracy_rate >= 60 ? 'rate-mid' : 'rate-low');

            // 3. 時間耗時
            const startJSDate = new Date(log.start_time);
            const endJSDate = new Date(log.end_time);
            const diffSec = Math.round((endJSDate - startJSDate) / 1000);
            const durationStr = diffSec >= 60 ? `${Math.floor(diffSec/60)}分${diffSec%60}秒` : `${diffSec}秒`;
            const dateStr = startJSDate.toLocaleDateString('zh-TW', {month:'2-digit', day:'2-digit'});
            const timeStr = startJSDate.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});

            // 4. 錯題按鈕判定
            let wrongBtnHtml = '<span style="color:#aaa;">無錯題 ✨</span>';
            let wrongCount = log.wrong_word_ids ? log.wrong_word_ids.length : 0;
            
            if (wrongCount > 0) {
                wrongBtnHtml = `<button class="btn-wrong-spec" onclick="toggleWrongDetails(${index}, [${log.wrong_word_ids.join(',')}])">查看錯題 (${wrongCount})</button>`;
            }

            mainTr.innerHTML = `
                <td>${typeBadge}</td>
                <td><strong>${log.category_code}</strong></td>
                <td>${log.correct_answers} / ${log.total_questions} 題</td>
                <td><span class="${rateClass}">${log.accuracy_rate}%</span></td>
                <td><small>${dateStr} ${timeStr}<br>⏱️ 耗時 ${durationStr}</small></td>
                <td>${wrongBtnHtml}</td>
            `;
            tbody.appendChild(mainTr);

            // 建立隱藏的下拉詳情列 (Details Row)
            const detailsTr = document.createElement('tr');
            detailsTr.id = `details-row-${index}`;
            detailsTr.className = 'details-row';
            detailsTr.innerHTML = `
                <td colspan="6">
                    <div class="details-container" id="details-container-${index}">
                        ⏳ 正在從雲端載入錯題單字資訊與星號狀態...
                    </div>
                </td>
            `;
            tbody.appendChild(detailsTr);
        });
    }

    // 🌟 點擊時非同步向 Supabase 撈取該批錯題的詳細中文、英文資訊與使用者的星號狀態
    async function toggleWrongDetails(rowIndex, wordIdsArray) {
        const row = document.getElementById(`details-row-${rowIndex}`);
        const container = document.getElementById(`details-container-${rowIndex}`);

        if (row.style.display === 'table-row') {
            row.style.display = 'none';
            return;
        }

        row.style.display = 'table-row';

        // 如果已經載入過，就不重複呼叫 API
        if (container.getAttribute('data-loaded') === 'true') return;

        if (!wordIdsArray || wordIdsArray.length === 0) {
            container.innerText = "沒有錯題紀錄。";
            return;
        }

        // 1. 向 words 資料表批次查詢這些 ID 的內容
        const { data: words, error: wordsError } = await supabaseClient
            .from('words')
            .select('id, en, ch, hint')
            .in('id', wordIdsArray);

        if (wordsError) {
            container.innerHTML = `<span style="color:red;">載入錯題失敗: ${wordsError.message}</span>`;
            return;
        }

        if (!words || words.length === 0) {
            container.innerText = "⚠️ 找不到對應的單字資料（可能已被管理員刪除）。";
            return;
        }

        // 2. 向 user_word_stats 查詢當前使用者對這群單字的星號標記狀態
        const { data: stats, error: statsError } = await supabaseClient
            .from('user_word_stats')
            .select('word_id, is_starred')
            .eq('user_id', currentUser.id)
            .in('word_id', wordIdsArray);

        // 建立星號快速對照 Map (WordId -> is_starred)
        const starredMap = new Map();
        if (!statsError && stats) {
            stats.forEach(s => starredMap.set(s.word_id, s.is_starred));
        }

        // 3. 渲染錯題標籤與星號按鈕
        let html = '<p style="margin: 0 0 10px 0; font-weight:bold; color:#c0392b;">❌ 當時答錯的單字清單（點擊星號可收藏單字）：</p>';
        words.forEach(w => {
            const hintText = w.hint ? ` (${w.hint})` : '';
            const isStarred = starredMap.get(w.id) === true;
            const starIcon = isStarred ? '★' : '☆';
            const starClass = isStarred ? 'star-active' : 'star-inactive';

            html += `
                <span class="wrong-word-tag">
                    <b>${w.en}</b> : ${w.ch} <small style="color:#7f8c8d;">${hintText}</small>
                    <button id="star-btn-${w.id}" class="btn-star ${starClass}" onclick="toggleStar(${w.id})">${starIcon}</button>
                </span>
            `;
        });

        container.innerHTML = html;
        container.setAttribute('data-loaded', 'true'); // 標記載入完成
    }

    // 🌟 處理星號標記的切換功能 (Upsert 邏輯)
    async function toggleStar(wordId) {
        const starBtn = document.getElementById(`star-btn-${wordId}`);
        const isCurrentlyStarred = starBtn.classList.contains('star-active');
        const nextStarredStatus = !isCurrentlyStarred;

        // 先行優化前端 UI 反饋（讓使用者感覺流暢）
        if (nextStarredStatus) {
            starBtn.innerText = '★';
            starBtn.className = 'btn-star star-active';
        } else {
            starBtn.innerText = '☆';
            starBtn.className = 'btn-star star-inactive';
        }

        // 同步寫入雲端資料庫 user_word_stats
        // 註：這需要 user_word_stats 資料表具備 (user_id, word_id) 的唯一約束 (Unique Constraint) 才能正常運行單條 upsert。
        const { error } = await supabaseClient
            .from('user_word_stats')
            .upsert({
                user_id: currentUser.id,
                word_id: wordId,
                is_starred: nextStarredStatus,
                last_attempt_at: new Date().toISOString()
            }, { onConflict: 'user_id, word_id' }); // 依據使用者與單字唯一識別進行覆蓋

        if (error) {
            console.error("同步星號失敗:", error.message);
            alert(`儲存星號失敗: ${error.message}`);
            // 失敗時回滾前端 UI 狀態
            if (isCurrentlyStarred) {
                starBtn.innerText = '★';
                starBtn.className = 'btn-star star-active';
            } else {
                starBtn.innerText = '☆';
                starBtn.className = 'btn-star star-inactive';
            }
        }
    }
</script>

</body>
</html>
