<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字與句子口說練習器 (雲端辨識版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* 初始隱藏主視窗，確認登入後才顯示 */
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
            display: none; 
        }
        
        .user-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e2e8f0;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .btn-logout { background-color: #ef4444; padding: 4px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer;}
        .btn-logout:hover { background-color: #dc2626; }

        .accuracy-selector {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: left;
        }

        .accuracy-selector label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .accuracy-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .accuracy-btn {
            padding: 8px 16px;
            border: 2px solid #cbd5e1;
            background-color: white;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }

        .accuracy-btn:hover {
            border-color: #3498db;
            background-color: #e3f2fd;
        }

        .accuracy-btn.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        select, button {
            font-size: 16px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .word-display {
            font-size: 38px;
            font-weight: bold;
            color: #2c3e50;
            margin: 15px 0 5px 0;
        }
        .ch-display {
            font-size: 22px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        
        /* 英文句子容器區塊 */
        .sentence-container {
            background-color: #f8fafc;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 6px 6px 0;
            text-align: left;
        }
        .sentence-en {
            font-size: 20px;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .sentence-ch {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .audio-btn {
            background-color: #008CBA;
            margin: 0;
            flex: 1;
            min-width: 130px;
        }
        .audio-btn:hover { background-color: #007B9A; }
        
        /* 口說錄音專用面板 */
        .speak-panel {
            background-color: #f0fdf4;
            border: 2px dashed #4ade80;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .mic-btn {
            background-color: #2ecc71;
            font-size: 18px;
            padding: 12px;
            margin: 0 0 10px 0;
        }
        .mic-btn:hover { background-color: #27ae60; }
        .mic-btn.recording {
            background-color: #ef4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .recognized-box {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            min-height: 36px;
            font-size: 16px;
            color: #475569;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress-text {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 10px;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
        
        .summary-title {
            font-size: 28px;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .accuracy-info {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container" id="app-container">
    <h2>🗣️ 英文單字與句子口說練習 (雲端連線版)</h2>
    
    <div id="user-bar" class="user-info-bar">
        <span>👤 學生：<span id="user-email-display">載入中...</span></span>
        <button id="logout-btn" class="btn-logout">登出</button>
    </div>
    
    <label for="db-select" style="text-align: left; display: block; font-weight: bold; font-size: 14px; color: #555;">選擇單字分類 (Category)：</label>
    <select id="db-select">
        <option value="">正在從雲端同步分類...</option>
    </select>

    <div class="accuracy-selector">
        <label>🎯 選擇口說正確率門檻：</label>
        <div class="accuracy-buttons">
            <button type="button" class="accuracy-btn" data-accuracy="100">💯 完美 (100%)</button>
            <button type="button" class="accuracy-btn" data-accuracy="90">⭐ 優秀 (90%)</button>
            <button type="button" class="accuracy-btn" data-accuracy="80">👍 良好 (80%)</button>
            <button type="button" class="accuracy-btn active" data-accuracy="60">🆗 基礎 (60%)</button>
        </div>
        <div class="accuracy-info">💡 選擇難度越高，對口說發音的要求越嚴格</div>
    </div>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div id="exercise-section">
        <div class="progress-text" id="progress-bar">進度: 0 / 0</div>

        <div class="word-display" id="en-word">Loading...</div>
        <div class="ch-display" id="ch-word">載入中...</div>
        
        <div class="sentence-container" id="sentence-section">
            <div style="font-size: 12px; color: #3498db; font-weight: bold; margin-bottom: 4px;">💡 請口說唸出此英文句子：</div>
            <div class="sentence-en" id="sentence-en">載入中...</div>
            <div class="sentence-ch" id="sentence-ch">載入中...</div>
        </div>
        
        <div class="btn-group">
            <button class="audio-btn" id="speak-en-btn" disabled>🔊 單字讀音 (Enter)</button>
            <button class="audio-btn" id="speak-sent-btn" style="background-color: #34495e;" disabled>🔊 句子讀音 (Shift)</button>
            <button class="audio-btn" id="speak-ch-btn" style="background-color: #9b59b6;" disabled>🔊 中文翻譯</button>
        </div>
        
        <div class="speak-panel">
            <button class="mic-btn" id="mic-btn" disabled>🎤 點擊或按 [空白鍵] 開始口說</button>
            <div class="recognized-box" id="recognized-text">尚未開始辨識...</div>
        </div>
        
        <div class="result" id="result-msg"></div>
    </div>
</div>

<script>
    // Supabase 設定
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    
    let supabaseClient = null;
    let currentUser = null;
    let wordList = [];
    let currentIndex = 0;
    let isLocking = false; 
    let accuracyThreshold = 0.6; // 預設 60%

    // 語音辨識變數
    let recognition = null;
    let isListening = false;

    const appContainer = document.getElementById('app-container');
    const dbSelect = document.getElementById('db-select');
    const progressBar = document.getElementById('progress-bar');
    const enWord = document.getElementById('en-word');
    const chWord = document.getElementById('ch-word');
    const sentenceSection = document.getElementById('sentence-section');
    const sentenceEn = document.getElementById('sentence-en');
    const sentenceCh = document.getElementById('sentence-ch');
    
    const speakEnBtn = document.getElementById('speak-en-btn');
    const speakSentBtn = document.getElementById('speak-sent-btn');
    const speakChBtn = document.getElementById('speak-ch-btn');
    
    const micBtn = document.getElementById('mic-btn');
    const recognizedTextDisplay = document.getElementById('recognized-text');
    const resultMsg = document.getElementById('result-msg');

    window.onload = async function() {
        if (typeof window.supabase === 'undefined') {
            alert("⚠️ 系統載入失敗！您的瀏覽器攔截了資料庫連線。");
            return;
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 檢查使用者登入狀態
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user) {
            currentUser = session.user;
            document.getElementById('user-email-display').innerText = currentUser.email;
            appContainer.style.display = 'block';
            
            initSpeechRecognition();
            bindEvents();
            bindAccuracyButtons();
            await loadCategoriesFromSupabase();
        } else {
            window.location.href = 'login.html';
        }
    };

    // 初始化瀏覽器語音辨識
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("⚠️ 您的瀏覽器不支援 Web Speech API 語音辨識，請使用 Google Chrome 瀏覽器進行口說練習。");
            return;
        }
        
        recognition = new SpeechRecognition();
        recognition.continuous = false;     // 單次辨識
        recognition.interimResults = false;   // 只接收最終結果
        recognition.lang = 'en-US';          // 設定辨識語系為英文

        recognition.onstart = () => {
            isListening = true;
            micBtn.textContent = "🛑 正在聆聽，請開始朗讀句子...";
            micBtn.classList.add('recording');
        };

        recognition.onend = () => {
            isListening = false;
            micBtn.textContent = "🎤 點擊或按 [空白鍵] 開始口說";
            micBtn.classList.remove('recording');
        };

        recognition.onresult = (event) => {
            const resultText = event.results[0][0].transcript;
            recognizedTextDisplay.textContent = `聽到的內容："${resultText}"`;
            checkSpeakingInput(resultText);
        };

        recognition.onerror = (event) => {
            console.error("語音辨識錯誤:", event.error);
            if (event.error === 'no-speech') {
                resultMsg.textContent = "❌ 沒有偵測到聲音，請再試一次。";
                resultMsg.className = "result error";
            } else {
                resultMsg.textContent = `❌ 辨識出錯 (${event.error})，請重新嘗試。`;
                resultMsg.className = "result error";
            }
        };
    }

    function bindAccuracyButtons() {
        const accuracyButtons = document.querySelectorAll('.accuracy-btn');
        accuracyButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 移除所有 active 類
                accuracyButtons.forEach(b => b.classList.remove('active'));
                // 添加 active 類到點擊的按鈕
                e.target.classList.add('active');
                // 更新門檻
                accuracyThreshold = parseInt(e.target.getAttribute('data-accuracy')) / 100;
            });
        });
    }

    function bindEvents() {
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        dbSelect.addEventListener('change', loadWordsFromSupabase);
        
        // 語音播放綁定
        speakEnBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            if(wordList[currentIndex]) speak(wordList[currentIndex].en, 'en-US');
        });

        speakSentBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            if(wordList[currentIndex]) {
                const targetText = wordList[currentIndex].sentence_en || wordList[currentIndex].en;
                speak(targetText, 'en-US');
            }
        });

        speakChBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            if(wordList[currentIndex]) {
                const targetCh = wordList[currentIndex].sentence_ch || wordList[currentIndex].ch;
                speak(targetCh, 'zh-TW');
            }
        });

        // 麥克風點擊按鈕
        micBtn.addEventListener('click', toggleListening);

        // 鍵盤快捷鍵支援
        window.addEventListener('keydown', (e) => {
            if (currentIndex >= wordList.length || isLocking) return;

            // 1. Enter 鍵：重複播放單字發音
            if (e.key === 'Enter') {
                e.preventDefault();
                window.speechSynthesis.cancel();
                if(wordList[currentIndex]) speak(wordList[currentIndex].en, 'en-US');
            }

            // 2. Shift 鍵：重複播放句子發音
            if (e.key === 'Shift') {
                e.preventDefault();
                window.speechSynthesis.cancel();
                if(wordList[currentIndex]) {
                    const targetText = wordList[currentIndex].sentence_en || wordList[currentIndex].en;
                    speak(targetText, 'en-US');
                }
            }

            // 3. 空白鍵：切換語音錄音開關 (排除選擇選單時)
            if (e.key === ' ' && document.activeElement !== dbSelect) {
                e.preventDefault();
                toggleListening();
            }
        });
    }

    function toggleListening() {
        if (!recognition || isLocking) return;
        window.speechSynthesis.cancel(); // 開始說話前，先停止正在播放的系統語音

        if (isListening) {
            recognition.stop();
        } else {
            resultMsg.textContent = "";
            recognition.start();
        }
    }

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        window.location.href = 'login.html'; 
    }

    // 從資料庫加載分類
    async function loadCategoriesFromSupabase() {
        const { data, error } = await supabaseClient
            .from('categories')
            .select('code, name')
            .order('created_at', { ascending: true });

        if (error) {
            alert(`載入單字庫分類失敗：${error.message}`);
            return;
        }

        dbSelect.innerHTML = '';
        if (data && data.length > 0) {
            data.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.code;
                opt.innerText = `${cat.name} (${cat.code})`;
                dbSelect.appendChild(opt);
            });
            loadWordsFromSupabase();
        } else {
            dbSelect.innerHTML = '<option value="">⚠️ 雲端目前未設定任何分類</option>';
            enWord.textContent = "請先至後台新增分類";
            chWord.textContent = "";
        }
    }

    // 下載單字庫
    async function loadWordsFromSupabase() {
        if (!supabaseClient || !currentUser) return;
        const targetCategory = dbSelect.value;
        if (!targetCategory) return;

        enWord.textContent = "下載中...";
        chWord.textContent = "從雲端同步數據...";
        sentenceEn.textContent = "";
        sentenceCh.textContent = "";
        
        speakEnBtn.disabled = true;
        speakSentBtn.disabled = true;
        speakChBtn.disabled = true;
        micBtn.disabled = true;

        const { data: wordsData, error: wordsError } = await supabaseClient
            .from('words')
            .select('*')
            .eq('category_code', targetCategory);

        if (wordsError) {
            enWord.textContent = "錯誤";
            chWord.textContent = `載入失敗: ${wordsError.message}`;
            return;
        }

        wordList = wordsData || [];

        if (wordList.length > 0) {
            // 隨機打亂排序
            wordList.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            isLocking = false;
            
            showWord();
        } else {
            enWord.textContent = "空字庫";
            chWord.textContent = "此分類目前沒有任何單字數據。";
            sentenceEn.textContent = "";
            sentenceCh.textContent = "";
            progressBar.textContent = "進度: 0 / 0";
        }
    }

    // 顯示口說題目
    function showWord() {
        if (currentIndex >= wordList.length) {
            endSession();
            return;
        }

        const currentData = wordList[currentIndex];
        
        progressBar.textContent = `進度: ${currentIndex + 1} / ${wordList.length}`;
        enWord.textContent = currentData.en;     
        chWord.textContent = currentData.ch;     
        
        // 判斷雲端是否有設定完整的句子（若無，則以單字作為練習目標）
        if (currentData.sentence_en) {
            sentenceEn.textContent = currentData.sentence_en;
            sentenceCh.textContent = currentData.sentence_ch || '(無中文翻譯)';
        } else {
            sentenceEn.textContent = currentData.en;
            sentenceCh.textContent = currentData.ch;
        }
        
        recognizedTextDisplay.textContent = '尚未開始辨識...';
        resultMsg.textContent = '';              
        
        // 啟用全部控制按鈕
        speakEnBtn.disabled = false;
        speakSentBtn.disabled = false;
        speakChBtn.disabled = false;
        micBtn.disabled = false;
        
        // 自動導引朗讀：先念單字，再念句子
        window.speechSynthesis.cancel();
        speak(currentData.en, 'en-US', () => {
            const textToSpeak = currentData.sentence_en || currentData.en;
            setTimeout(() => {
                speak(textToSpeak, 'en-US');
            }, 400);
        });
    }

    // 比對口說結果
    function checkSpeakingInput(userSpoken) {
        if (isLocking || currentIndex >= wordList.length) return;

        const currentData = wordList[currentIndex];
        // 設定標準目標字串（優先判定句子，若無句子則比對單字）
        const targetText = currentData.sentence_en ? currentData.sentence_en : currentData.en;

        // 進行文本標準化（轉小寫、去除常見標點符號、前後空白）
        const normalizedUser = cleanText(userSpoken);
        const normalizedTarget = cleanText(targetText);

        // 計算相似度百分比
        const similarity = getSimilarity(normalizedUser, normalizedTarget);
        const accuracyPercent = Math.round(similarity * 100);

        // 根據選擇的門檻進行檢查
        if (similarity >= accuracyThreshold) {
            isLocking = true;
            resultMsg.textContent = `🎯 太棒了！發音正確率達 ${accuracyPercent}%！`;
            resultMsg.className = "result success";
            
            // 慶祝音效提示過關，並自動進入下一題
            speak("Good job!", "en-US");

            setTimeout(() => {
                currentIndex++;
                isLocking = false;
                showWord();
            }, 1500);
            
        } else {
            resultMsg.textContent = `❌ 聽起來不太像喔 (正確率: ${accuracyPercent}%)，請再試著念一次！`;
            resultMsg.className = "result error";
        }
    }

    // 格式化字串：移除標點符號
    function cleanText(str) {
        return str.toLowerCase()
                  .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, "")
                  .replace(/\s+/g, " ")
                  .trim();
    }

    // 核心演算法：計算兩個字串的字元相似度 (Levenshtein Distance)
    function getSimilarity(s1, s2) {
        const len1 = s1.length;
        const len2 = s2.length;
        const maxLen = Math.max(len1, len2);
        if (maxLen === 0) return 1.0;

        // 初始化動態規劃矩陣
        const dp = Array(len1 + 1).fill(null).map(() => Array(len2 + 1).fill(0));
        for (let i = 0; i <= len1; i++) dp[i][0] = i;
        for (let j = 0; j <= len2; j++) dp[0][j] = j;

        for (let i = 1; i <= len1; i++) {
            for (let j = 1; j <= len2; j++) {
                if (s1[i - 1] === s2[j - 1]) {
                    dp[i][j] = dp[i - 1][j - 1];
                } else {
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1,    // 刪除
                        dp[i][j - 1] + 1,    // 插入
                        dp[i - 1][j - 1] + 1 // 替換
                    );
                }
            }
        }
        // 回傳 0.0 ~ 1.0 之間的相似度比例
        return (maxLen - dp[len1][len2]) / maxLen;
    }

    // 網頁語音合成發音 (TTS)
    function speak(text, lang, onEndCallback = null) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;        
            utterance.rate = 0.85; // 速度稍慢便於學習聽講     
            if (onEndCallback) {
                utterance.onend = onEndCallback;
            }
            window.speechSynthesis.speak(utterance);
        }
    }

    // 結束口說練習畫面
    function endSession() {
        window.speechSynthesis.cancel();
        speak("恭喜你，完成所有單字與句子的口說挑戰！", "zh-TW");

        const exerciseSection = document.getElementById('exercise-section');
        exerciseSection.innerHTML = `
            <div class="summary-title">🎉 完美通關！</div>
            <p style="font-size: 18px; color: #555;">您已經成功完成了本單字庫的所有口說發音特訓！</p>
            <div style="font-size: 56px; margin: 20px 0;">🥇</div>
