<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>句子生成與編輯系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 30px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
        }

        .btn-logout {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 40px;
        }

        .control-panel {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 20px;
            margin-bottom: 30px;
            align-items: flex-end;
            background: #f9fbfc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e0e7ff;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
            background-color: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:hover {
            border-color: #667eea;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #38a169;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .word-list {
            display: grid;
            gap: 20px;
            margin-bottom: 30px;
        }

        .word-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s;
        }

        .word-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .word-card.generating {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .word-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e2e8f0;
        }

        .word-en {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
        }

        .word-ch {
            font-size: 16px;
            color: #718096;
            font-weight: 500;
        }

        .word-id {
            font-size: 12px;
            color: #a0aec0;
            background: #edf2f7;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .sentence-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .sentence-input-group {
            display: flex;
            flex-direction: column;
        }

        .input-label {
            font-weight: 600;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        textarea:hover {
            border-color: #667eea;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea:disabled {
            background-color: #f7fafc;
            cursor: not-allowed;
        }

        .loading-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #f3f4f6;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status-message {
            font-size: 13px;
            margin-top: 8px;
            padding: 8px 12px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-generating {
            background: #e6f3ff;
            color: #2c5aa0;
        }

        .status-error {
            background: #ffe6e6;
            color: #c53030;
        }

        .status-success {
            background: #e6ffe6;
            color: #22543d;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            padding-top: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            background: white;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-small:hover {
            background: #f7fafc;
            border-color: #667eea;
            color: #667eea;
        }

        .footer {
            padding: 30px 40px;
            background: #f9fbfc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats {
            font-size: 13px;
            color: #718096;
        }

        .update-all-section {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .alert-info {
            background: #e6f3ff;
            border: 1px solid #90cdf4;
            color: #2c5aa0;
        }

        .alert-error {
            background: #ffe6e6;
            border: 1px solid #fc8181;
            color: #c53030;
        }

        .alert-success {
            background: #e6ffe6;
            border: 1px solid #9ae6b4;
            color: #22543d;
        }

        @media (max-width: 768px) {
            .control-panel {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .sentence-section {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                gap: 15px;
            }

            .word-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }

            .footer {
                flex-direction: column;
                gap: 15px;
            }

            .update-all-section {
                flex-direction: column;
                width: 100%;
            }

            .stats {
                width: 100%;
                text-align: center;
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: #a0aec0;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 句子生成與編輯系統</h1>
            <div class="user-info">
                <span>👤 <span id="user-email">載入中...</span></span>
                <button class="btn-logout" id="logout-btn">登出</button>
            </div>
        </div>

        <div class="content">
            <div id="alert-container"></div>

            <div class="control-panel">
                <div>
                    <label for="category-select">選擇單字分類</label>
                    <select id="category-select">
                        <option value="">載入中...</option>
                    </select>
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="load-words-btn">
                        <span>📂 載入單字</span>
                    </button>
                    <button class="btn-secondary" id="generate-all-btn" disabled>
                        <span>✨ 生成全部句子</span>
                    </button>
                </div>
            </div>

            <div id="word-container" class="word-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📚</div>
                    <p>請選擇分類並載入單字</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="stats">
                <span>已編輯: <strong id="edited-count">0</strong></span>
                <span style="margin-left: 20px;">已生成: <strong id="generated-count">0</strong></span>
                <span style="margin-left: 20px;">總數: <strong id="total-count">0</strong></span>
            </div>
            <div class="update-all-section">
                <button class="btn-primary" id="update-all-btn" disabled>
                    🔄 更新所有句子到資料庫
                </button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 設定 ====================
        const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
       
// const GEMINI_API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent';

// 修改後：使用 8B 輕量化模型
const GEMINI_API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent';

        // ==================== 全局狀態 ====================
        let supabaseClient = null;
        let currentUser = null;
        let currentCategory = null;
        let wordList = [];
        let wordDataMap = new Map(); // 追蹤修改狀態

        // ==================== 初始化 ====================
        window.onload = async function () {
            if (typeof window.supabase === 'undefined') {
                showAlert('系統載入失敗！您的瀏覽器攔截了資料庫連線。', 'error');
                return;
            }

            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // 檢查使用者登入
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session && session.user) {
                currentUser = session.user;
                document.getElementById('user-email').innerText = currentUser.email;
                bindEvents();
                loadCategoriesFromSupabase();
                loadApiKeyFromLocalStorage();
            } else {
                window.location.href = 'login.html';
            }
        };

        // ==================== 事件綁定 ====================
        function bindEvents() {
            document.getElementById('logout-btn').addEventListener('click', handleLogout);
            document.getElementById('category-select').addEventListener('change', loadWordsFromSupabase);
            document.getElementById('load-words-btn').addEventListener('click', loadWordsFromSupabase);
            document.getElementById('generate-all-btn').addEventListener('click', generateAllSentences);
            document.getElementById('update-all-btn').addEventListener('click', updateAllToDatabase);
        }

        // ==================== 登出 ====================
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }

        // ==================== 載入分類 ====================
        async function loadCategoriesFromSupabase() {
            const selectEl = document.getElementById('category-select');
            const { data, error } = await supabaseClient
                .from('categories')
                .select('code, name')
                .order('created_at', { ascending: true });

            if (error) {
                showAlert(`載入分類失敗: ${error.message}`, 'error');
                return;
            }

            selectEl.innerHTML = '<option value="">選擇分類...</option>';
            if (data && data.length > 0) {
                data.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.code;
                    opt.innerText = `${cat.name} (${cat.code})`;
                    selectEl.appendChild(opt);
                });
            }
        }

        // ==================== 載入單字 ====================
        async function loadWordsFromSupabase() {
            const categoryCode = document.getElementById('category-select').value;
            if (!categoryCode) {
                showAlert('請選擇分類', 'error');
                return;
            }

            currentCategory = categoryCode;
            document.getElementById('load-words-btn').disabled = true;
            document.getElementById('load-words-btn').innerHTML = '<span class="loading-spinner"></span> 載入中...';

            try {
                const { data, error } = await supabaseClient
                    .from('words')
                    .select('*')
                    .eq('category_code', categoryCode)
                    .order('id', { ascending: true });

                if (error) {
                    showAlert(`載入失敗: ${error.message}`, 'error');
                    return;
                }

                wordList = data || [];
                wordDataMap.clear();

                wordList.forEach(word => {
                    wordDataMap.set(word.id, {
                        sentence_en: word.sentence_en || '',
                        sentence_ch: word.sentence_ch || '',
                        modified: false
                    });
                });

                renderWordCards();
                updateStats();
                document.getElementById('generate-all-btn').disabled = false;
                document.getElementById('update-all-btn').disabled = false;

                showAlert(`已載入 ${wordList.length} 個單字`, 'success');
            } finally {
                document.getElementById('load-words-btn').disabled = false;
                document.getElementById('load-words-btn').innerHTML = '<span>📂 載入單字</span>';
            }
        }

        // ==================== 渲染單字卡片 ====================
        function renderWordCards() {
            const container = document.getElementById('word-container');

            if (wordList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <p>此分類沒有單字</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = wordList.map(word => {
                const data = wordDataMap.get(word.id) || {};
                return `
                    <div class="word-card" data-word-id="${word.id}">
                        <div class="word-header">
                            <div>
                                <div class="word-en">${word.en}</div>
                                <div class="word-ch">${word.ch}</div>
                            </div>
                            <div class="word-id">ID: ${word.id}</div>
                        </div>

                        <div class="sentence-section">
                            <div class="sentence-input-group">
                                <div class="input-label">英文句子</div>
                                <textarea 
                                    class="sentence-en" 
                                    data-word-id="${word.id}"
                                    placeholder="輸入或生成英文句子..."
                                >${data.sentence_en || ''}</textarea>
                            </div>
                            <div class="sentence-input-group">
                                <div class="input-label">中文句子</div>
                                <textarea 
                                    class="sentence-ch" 
                                    data-word-id="${word.id}"
                                    placeholder="輸入或生成中文句子..."
                                >${data.sentence_ch || ''}</textarea>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button class="btn-small generate-btn" data-word-id="${word.id}">
                                ✨ 生成句子
                            </button>
                            <button class="btn-small clear-btn" data-word-id="${word.id}">
                                🗑️ 清空
                            </button>
                        </div>

                        <div class="status-message" style="display: none;" data-word-id="${word.id}"></div>
                    </div>
                `;
            }).join('');

            // 綁定單個生成按鈕
            document.querySelectorAll('.generate-btn').forEach(btn => {
                btn.addEventListener('click', () => generateSentence(parseInt(btn.dataset.wordId)));
            });

            // 綁定清空按鈕
            document.querySelectorAll('.clear-btn').forEach(btn => {
                btn.addEventListener('click', () => clearSentences(parseInt(btn.dataset.wordId)));
            });

            // 綁定文本框變更監聽
            document.querySelectorAll('textarea').forEach(textarea => {
                textarea.addEventListener('change', (e) => {
                    const wordId = parseInt(textarea.dataset.wordId);
                    const type = textarea.classList.contains('sentence-en') ? 'sentence_en' : 'sentence_ch';
                    const data = wordDataMap.get(wordId);
                    if (data) {
                        data[type] = textarea.value;
                        data.modified = true;
                    }
                    updateStats();
                });
            });
        }

        // ==================== 生成單個句子 ====================
        async function generateSentence(wordId) {
            const word = wordList.find(w => w.id === wordId);
            if (!word) return;

            // 從 localStorage 取得 API 金鑰
            let API_KEY = localStorage.getItem('GEMINI_KEY');
            if (!API_KEY) {
                API_KEY = prompt("請輸入您的 Gemini API 金鑰：\n(這只會儲存在您的瀏覽器中，非常安全)");
                if (API_KEY && API_KEY.trim() !== "") {
                    localStorage.setItem('GEMINI_KEY', API_KEY.trim());
                } else {
                    showAlert('必須提供 API 金鑰才能生成句子', 'error');
                    return;
                }
            }

            const card = document.querySelector(`.word-card[data-word-id="${wordId}"]`);
            const statusDiv = card.querySelector(`[data-word-id="${wordId}"]`);
            const sentenceEnTextarea = card.querySelector('.sentence-en');
            const sentenceCHTextarea = card.querySelector('.sentence-ch');

            card.classList.add('generating');
            statusDiv.style.display = 'flex';
            statusDiv.className = 'status-message status-generating';
            statusDiv.innerHTML = '<span class="loading-spinner"></span> 正在生成句子...';

            try {
                const prompt = `請為以下英文單字生成一個國中程度的例句。
單字: ${word.en}
中文意思: ${word.ch}

要求:
1. 英文句子要包含該單字，盡量簡短
2. 句子要簡單易懂，適合國中學生
3. 中文句子要精確翻譯英文句子的意思

回應格式（使用 | 分隔）:
英文句子|中文句子

例如:
I like to eat apples every day.|我喜歡每天吃蘋果。`;

                const url = `${GEMINI_API_BASE}?key=${API_KEY}`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: prompt
                            }]
                        }]
                    })
                });

                const result = await response.json();

                if (result.error) {
                    throw new Error(result.error.message || '生成失敗');
                }

                const content = result.candidates[0].content.parts[0].text;

                // 解析回應
                const lines = content.split('\n').filter(l => l.includes('|'));
                if (lines.length > 0) {
                    const [enSentence, chSentence] = lines[0].split('|').map(s => s.trim());

                    sentenceEnTextarea.value = enSentence || '';
                    sentenceCHTextarea.value = chSentence || '';

                    // 更新 Map
                    const data = wordDataMap.get(wordId);
                    if (data) {
                        data.sentence_en = enSentence || '';
                        data.sentence_ch = chSentence || '';
                        data.modified = true;
                    }

                    statusDiv.className = 'status-message status-success';
                    statusDiv.innerHTML = '✅ 句子生成成功';
                    setTimeout(() => {
                        statusDiv.style.display = 'none';
                    }, 3000);
                } else {
                    throw new Error('無法解析 API 回應');
                }

                updateStats();
            } catch (error) {
                statusDiv.className = 'status-message status-error';
                statusDiv.innerHTML = `❌ ${error.message}`;
                console.error('生成句子失敗:', error);
            } finally {
                card.classList.remove('generating');
            }
        }

        // ==================== 生成全部句子 ====================
        async function generateAllSentences() {
            // 從 localStorage 取得 API 金鑰
            let API_KEY = localStorage.getItem('GEMINI_KEY');
            if (!API_KEY) {
                API_KEY = prompt("請輸入您的 Gemini API 金鑰：\n(這只會儲存在您的瀏覽器中，非常安全)");
                if (API_KEY && API_KEY.trim() !== "") {
                    localStorage.setItem('GEMINI_KEY', API_KEY.trim());
                } else {
                    showAlert('必須提供 API 金鑰才能生成句子', 'error');
                    return;
                }
            }

            if (!confirm(`將為 ${wordList.length} 個單字生成句子，是否確認？`)) return;

            document.getElementById('generate-all-btn').disabled = true;
            let successCount = 0;

            for (const word of wordList) {
                await generateSentence(word.id);
                successCount++;
                // 避免 API 限制，延遲 500ms
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            showAlert(`已為 ${successCount} 個單字生成句子`, 'success');
            document.getElementById('generate-all-btn').disabled = false;
        }

        // ==================== 清空句子 ====================
        function clearSentences(wordId) {
            const card = document.querySelector(`.word-card[data-word-id="${wordId}"]`);
            const sentenceEnTextarea = card.querySelector('.sentence-en');
            const sentenceCHTextarea = card.querySelector('.sentence-ch');

            sentenceEnTextarea.value = '';
            sentenceCHTextarea.value = '';

            const data = wordDataMap.get(wordId);
            if (data) {
                data.sentence_en = '';
                data.sentence_ch = '';
                data.modified = true;
            }

            updateStats();
        }

        // ==================== 更新全部到資料庫 ====================
        async function updateAllToDatabase() {
            const modifiedWords = [];

            for (const [wordId, data] of wordDataMap.entries()) {
                if (data.modified) {
                    modifiedWords.push({
                        id: wordId,
                        sentence_en: data.sentence_en,
                        sentence_ch: data.sentence_ch
                    });
                }
            }

            if (modifiedWords.length === 0) {
                showAlert('沒有修改的單字需要更新', 'error');
                return;
            }

            if (!confirm(`將更新 ${modifiedWords.length} 個單字的句子，是否確認？`)) return;

            document.getElementById('update-all-btn').disabled = true;
            const btn = document.getElementById('update-all-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-spinner"></span> 更新中...';

            try {
                for (const word of modifiedWords) {
                    const { error } = await supabaseClient
                        .from('words')
                        .update({
                            sentence_en: word.sentence_en,
                            sentence_ch: word.sentence_ch
                        })
                        .eq('id', word.id);

                    if (error) {
                        showAlert(`單字 ID ${word.id} 更新失敗: ${error.message}`, 'error');
                        return;
                    }

                    // 更新本地狀態
                    const data = wordDataMap.get(word.id);
                    if (data) {
                        data.modified = false;
                    }
                }

                showAlert(`已成功更新 ${modifiedWords.length} 個單字到資料庫`, 'success');
                updateStats();
            } catch (error) {
                showAlert(`更新失敗: ${error.message}`, 'error');
            } finally {
                document.getElementById('update-all-btn').disabled = false;
                btn.innerHTML = originalText;
            }
        }

        // ==================== 更新統計 ====================
        function updateStats() {
            let editedCount = 0;
            let generatedCount = 0;

            for (const [wordId, data] of wordDataMap.entries()) {
                if (data.modified) {
                    editedCount++;
                }
                if (data.sentence_en || data.sentence_ch) {
                    generatedCount++;
                }
            }

            document.getElementById('edited-count').innerText = editedCount;
            document.getElementById('generated-count').innerText = generatedCount;
            document.getElementById('total-count').innerText = wordList.length;
        }

        // ==================== API 金鑰管理 ====================
        function loadApiKeyFromLocalStorage() {
            const key = localStorage.getItem('GEMINI_KEY');
            // 只在首次載入時從 localStorage 讀取，不顯示在 UI
        }

        // ==================== 提示訊息 ====================
        function showAlert(message, type = 'info') {
            const container = document.getElementById('alert-container');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.innerHTML = `
                <span>${type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️'}</span>
                <span>${message}</span>
            `;

            container.appendChild(alert);
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
    </script>
</body>
