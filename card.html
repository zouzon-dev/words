<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Words Flashcard - 單字卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        /* Controls Section */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        .control-group select,
        .control-group input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .control-group select:focus,
        .control-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .buttons-row {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #d0d0d0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Card Section */
        .card-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            min-height: 350px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.3);
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .card-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .card-text {
            color: white;
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 15px;
            word-break: break-word;
        }

        .card-subtext {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1em;
        }

        .card-hint {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85em;
            margin-top: 20px;
            font-style: italic;
        }

        /* Navigation */
        .navigation {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: #667eea;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: #764ba2;
            transform: scale(1.1);
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .card-counter {
            color: #666;
            font-size: 1.1em;
            font-weight: 600;
            min-width: 120px;
            text-align: center;
        }

        /* Status */
        .status {
            margin-top: 20px;
            padding: 15px 20px;
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            border-radius: 8px;
            color: #333;
            font-size: 0.95em;
        }

        .status.error {
            background: #ffe0e0;
            border-left-color: #e74c3c;
            color: #c0392b;
        }

        .status.loading {
            background: #e8f5e9;
            border-left-color: #667eea;
            color: #2e7d32;
        }

        .loading-spinner {
            display: inline-block;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: currentColor;
            margin-right: 8px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .controls {
                grid-template-columns: 1fr;
            }

            .card {
                aspect-ratio: auto;
                min-height: 280px;
            }

            .card-text {
                font-size: 2em;
            }

            .nav-btn {
                width: 45px;
                height: 45px;
                font-size: 1em;
            }

            .card-counter {
                font-size: 0.95em;
            }
        }

        .flip-animation {
            animation: flip 0.6s ease-in-out;
        }

        @keyframes flip {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(90deg); }
            100% { transform: rotateY(0deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 單字卡</h1>
            <p>Words Flashcard Practice</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="wordSet">Word Set:</label>
                <select id="wordSet">
                    <option value="">All Sets</option>
                </select>
            </div>

            <div class="control-group">
                <label for="filterStarted">
                    <input type="checkbox" id="filterStarted"> Show Started Only
                </label>
            </div>

            <div class="buttons-row">
                <button class="btn btn-primary" id="loadBtn">Load Words</button>
                <button class="btn btn-secondary" id="autoplayBtn">Auto Play</button>
                <button class="btn btn-secondary" id="resetBtn">Reset</button>
            </div>
        </div>

        <div class="card-section">
            <div class="card" id="card">
                <div class="card-content">
                    <div class="card-label">English</div>
                    <div class="card-text" id="cardText">Click "Load Words" to start</div>
                    <div class="card-hint">Click card to reveal Chinese</div>
                </div>
            </div>

            <div class="navigation">
                <button class="nav-btn" id="prevBtn" disabled>❮</button>
                <div class="card-counter">
                    <span id="currentCard">0</span> / <span id="totalCards">0</span>
                </div>
                <button class="nav-btn" id="nextBtn" disabled>❯</button>
            </div>

            <div id="status"></div>
        </div>
    </div>

    <script>
        // Configuration
        const SUPABASE_URL = 'https://your-supabase-url.supabase.co';
        const SUPABASE_KEY = 'your-supabase-anon-key';

        // State
        let words = [];
        let currentIndex = 0;
        let isFlipped = false;
        let isAutoplay = false;
        let autoplayInterval = null;

        // DOM Elements
        const card = document.getElementById('card');
        const cardText = document.getElementById('cardText');
        const loadBtn = document.getElementById('loadBtn');
        const autoplayBtn = document.getElementById('autoplayBtn');
        const resetBtn = document.getElementById('resetBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const wordSetSelect = document.getElementById('wordSet');
        const filterStartedCheckbox = document.getElementById('filterStarted');
        const statusDiv = document.getElementById('status');
        const currentCardSpan = document.getElementById('currentCard');
        const totalCardsSpan = document.getElementById('totalCards');

        // Event Listeners
        loadBtn.addEventListener('click', loadWords);
        autoplayBtn.addEventListener('click', toggleAutoplay);
        resetBtn.addEventListener('click', reset);
        prevBtn.addEventListener('click', previousCard);
        nextBtn.addEventListener('click', nextCard);
        card.addEventListener('click', flipCard);
        wordSetSelect.addEventListener('change', updateWordSets);
        filterStartedCheckbox.addEventListener('change', loadWords);

        // Functions
        async function loadWords() {
            try {
                showStatus('Loading words...', 'loading');
                
                // Fetch data from Supabase
                const endpoint = `${SUPABASE_URL}/rest/v1/words?select=*`;
                
                let queryParams = [];
                
                // Filter by word set if selected
                if (wordSetSelect.value) {
                    queryParams.push(`word_set=eq.${wordSetSelect.value}`);
                }
                
                // Filter by started status if checked
                if (filterStartedCheckbox.checked) {
                    queryParams.push(`status=eq.started`);
                }
                
                const fullUrl = queryParams.length > 0 
                    ? `${endpoint}&${queryParams.join('&')}`
                    : endpoint;

                const response = await fetch(fullUrl, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                words = await response.json();

                if (words.length === 0) {
                    showStatus('No words found. Please check your filters or add words to Supabase.', 'error');
                    updateUI();
                    return;
                }

                currentIndex = 0;
                isFlipped = false;
                updateUI();
                showStatus(`Loaded ${words.length} words successfully!`);
                
            } catch (error) {
                showStatus(`Error loading words: ${error.message}`, 'error');
                console.error('Error:', error);
            }
        }

        async function loadWordSets() {
            try {
                const endpoint = `${SUPABASE_URL}/rest/v1/word_sets?select=id,name`;
                
                const response = await fetch(endpoint, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const sets = await response.json();
                updateWordSetsDropdown(sets);
                
            } catch (error) {
                console.error('Error loading word sets:', error);
            }
        }

        function updateWordSetsDropdown(sets) {
            const currentValue = wordSetSelect.value;
            wordSetSelect.innerHTML = '<option value="">All Sets</option>';
            
            sets.forEach(set => {
                const option = document.createElement('option');
                option.value = set.id;
                option.textContent = set.name;
                wordSetSelect.appendChild(option);
            });
            
            wordSetSelect.value = currentValue;
        }

        function updateWordSets() {
            // Called when word set selection changes
            // Will be used to filter words on next load
        }

        function flipCard() {
            if (words.length === 0) return;
            
            isFlipped = !isFlipped;
            card.classList.add('flip-animation');
            
            setTimeout(() => {
                updateCardDisplay();
                card.classList.remove('flip-animation');
            }, 300);
        }

        function nextCard() {
            if (currentIndex < words.length - 1) {
                currentIndex++;
                isFlipped = false;
                updateUI();
            }
        }

        function previousCard() {
            if (currentIndex > 0) {
                currentIndex--;
                isFlipped = false;
                updateUI();
            }
        }

        function toggleAutoplay() {
            if (words.length === 0) {
                showStatus('Please load words first', 'error');
                return;
            }

            isAutoplay = !isAutoplay;
            autoplayBtn.textContent = isAutoplay ? '⏸ Stop' : '▶ Auto Play';
            autoplayBtn.classList.toggle('btn-primary');

            if (isAutoplay) {
                currentIndex = 0;
                isFlipped = false;
                updateUI();
                
                autoplayInterval = setInterval(() => {
                    if (isFlipped) {
                        flipCard();
                    } else {
                        nextCard();
                    }
                }, 3000); // Change card every 3 seconds
            } else {
                clearInterval(autoplayInterval);
            }
        }

        function reset() {
            words = [];
            currentIndex = 0;
            isFlipped = false;
            
            if (isAutoplay) {
                toggleAutoplay();
            }
            
            wordSetSelect.value = '';
            filterStartedCheckbox.checked = false;
            
            updateUI();
            showStatus('Reset complete');
        }

        function updateCardDisplay() {
            if (words.length === 0) {
                cardText.textContent = 'No words loaded';
                return;
            }

            const word = words[currentIndex];
            
            if (isFlipped) {
                cardText.innerHTML = `
                    <div style="font-size: 1.2em; margin-bottom: 10px;">中文</div>
                    <div>${word.chinese || 'N/A'}</div>
                    ${word.pronunciation ? `<div style="font-size: 0.9em; margin-top: 10px; opacity: 0.8;">${word.pronunciation}</div>` : ''}
                `;
            } else {
                cardText.innerHTML = `
                    <div style="font-size: 0.85em; margin-bottom: 15px;">English</div>
                    <div>${word.english || 'N/A'}</div>
                    ${word.part_of_speech ? `<div style="font-size: 0.9em; margin-top: 10px; opacity: 0.8;">${word.part_of_speech}</div>` : ''}
                `;
            }
        }

        function updateUI() {
            updateCardDisplay();
            updateNavigation();
            updateCounter();
        }

        function updateNavigation() {
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === words.length - 1 || words.length === 0;
        }

        function updateCounter() {
            currentCardSpan.textContent = words.length > 0 ? currentIndex + 1 : 0;
            totalCardsSpan.textContent = words.length;
        }

        function showStatus(message, type = 'info') {
            statusDiv.innerHTML = message;
            statusDiv.className = 'status';
            
            if (type === 'error') {
                statusDiv.classList.add('error');
            } else if (type === 'loading') {
                statusDiv.classList.add('loading');
                statusDiv.innerHTML = `<span class="loading-spinner"></span>${message}`;
            }
            
            if (type !== 'loading') {
                setTimeout(() => {
                    statusDiv.innerHTML = '';
                    statusDiv.className = '';
                }, 3000);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadWordSets();
            showStatus('Ready! Configure your settings and click "Load Words" to begin.');
        });
    </script>
</body>
</html>
