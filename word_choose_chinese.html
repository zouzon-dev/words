<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字看英選中練習 (四選一雲端版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* 初始隱藏主視窗，確認登入後才顯示 */
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
            display: none; 
        }
        
        .user-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e2e8f0;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .btn-logout { background-color: #ef4444; padding: 4px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer;}
        .btn-logout:hover { background-color: #dc2626; }

        select, button.action-btn {
            font-size: 16px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        button.action-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button.action-btn:hover { background-color: #45a049; }

        .word-display {
            font-size: 38px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0 5px 0;
            letter-spacing: 1px;
        }
        .hint-display {
            font-size: 15px;
            color: #94a3b8;
            margin-bottom: 25px;
            min-height: 22px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .audio-btn {
            font-size: 15px;
            padding: 10px;
            border-radius: 6px;
            border: none;
            color: white;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            background-color: #008CBA;
        }
        .audio-btn:hover { background-color: #007B9A; }
        
        /* 四選一按鈕版面樣式 */
        .choices-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        .choice-btn {
            background-color: #ffffff;
            color: #2c3e50;
            border: 2px solid #e2e8f0;
            padding: 14px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 500;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .choice-btn:hover:not(:disabled) {
            background-color: #f1f5f9;
            border-color: #3b82f6;
            transform: translateY(-1px);
        }
        /* 答對與答錯的樣式切換 */
        .choice-btn.correct {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #10b981 !important;
        }
        .choice-btn.incorrect {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #ef4444 !important;
            text-decoration: line-through;
            opacity: 0.6;
        }

        .progress-text {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 10px;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
        
        .summary-title {
            font-size: 28px;
            color: #27ae60;
            margin-bottom: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container" id="main-card">
    <h2>🧩 看英選中測驗 (四選一版)</h2>
    
    <div id="user-bar" class="user-info-bar">
        <span>👤 學生：<span id="user-email-display">載入中...</span></span>
        <button id="logout-btn" class="btn-logout">登出</button>
    </div>
    
    <label for="data-select" style="text-align: left; display: block; font-weight: bold; font-size: 14px; color: #555;">選擇單字分類 (Category)：</label>
    <select id="data-select">
        <option value="">正在從雲端同步分類...</option>
    </select>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div id="exercise-section">
        <div class="progress-text" id="progress-bar">進度: 0 / 0</div>

        <div class="word-display" id="en-word">Loading...</div>
        <div class="hint-display" id="hint-word">提示載入中...</div>
        
        <div class="btn-group">
            <button class="audio-btn" id="speak-en-btn" disabled>🔊 發音 (Enter)</button>
        </div>
        
        <div class="choices-grid" id="choices-container">
            </div>
        
        <div class="result" id="result-msg"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    
    let supabaseClient = null;
    let currentUser = null;
    let wordList = [];
    let currentIndex = 0;
    let isLocking = false; 

    window.onload = async function() {
        if (typeof window.supabase === 'undefined') {
            alert("⚠️ 系統載入失敗！您的瀏覽器攔截了資料庫連線。");
            return;
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 驗證使用者登入狀態
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user) {
            currentUser = session.user;
            document.getElementById('user-email-display').innerText = currentUser.email;
            document.getElementById('main-card').style.display = 'block'; 
            
            bindEvents();
            await loadCategoriesFromSupabase();
        } else {
            window.location.href = 'login.html';
        }
    };

    function bindEvents() {
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        document.getElementById('data-select').addEventListener('change', loadWordsFromSupabase);
        
        const speakEnBtn = document.getElementById('speak-en-btn');
        if (speakEnBtn) {
            speakEnBtn.addEventListener('click', () => {
                if(wordList[currentIndex]) speak(wordList[currentIndex].en);
            });
        }

        // 快捷鍵：按 Enter 鍵可以重複聽發音
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !isLocking) {
                if(wordList[currentIndex]) speak(wordList[currentIndex].en);
            }
        });
    }

    async function handleLogout() {
        await supabaseClient.auth.signOut();
        window.location.href = 'login.html'; 
    }

    // 從雲端撈取分類
    async function loadCategoriesFromSupabase() {
        const dataSelect = document.getElementById('data-select');
        const { data, error } = await supabaseClient
            .from('categories')
            .select('code, name')
            .order('created_at', { ascending: true });

        if (error) {
            alert(`載入單字庫分類失敗：${error.message}`);
            return;
        }

        dataSelect.innerHTML = '';
        if (data && data.length > 0) {
            data.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.code;
                opt.innerText = `${cat.name} (${cat.code})`;
                dataSelect.appendChild(opt);
            });
            loadWordsFromSupabase();
        } else {
            dataSelect.innerHTML = '<option value="">⚠️ 雲端目前未設定任何分類</option>';
            document.getElementById('en-word').innerText = "請先至後台新增分類";
        }
    }

    // 從雲端撈取特定分類的單字
    async function loadWordsFromSupabase() {
        if (!supabaseClient || !currentUser) return;
        const targetCategory = document.getElementById('data-select').value;
        if (!targetCategory) return;

        document.getElementById('en-word').innerText = "雲端單字載入中...";
        document.getElementById('hint-word').innerText = "";
        document.getElementById('choices-container').innerHTML = "";
        
        const { data: wordsData, error: wordsError } = await supabaseClient
            .from('words')
            .select('*')
            .eq('category_code', targetCategory);

        if (wordsError) {
            document.getElementById('en-word').innerHTML = `<span class="error">載入失敗: ${wordsError.message}</span>`;
            return;
        }

        wordList = wordsData || [];
        wordList.sort(() => Math.random() - 0.5); // 題庫隨機排序
        
        currentIndex = 0;
        isLocking = false;
        showQuestion();
    }

    function showQuestion() {
        const enWordEl = document.getElementById('en-word');
        const hintWordEl = document.getElementById('hint-word');
        const progressBarEl = document.getElementById('progress-bar');
        const choicesContainer = document.getElementById('choices-container');
        const resultMsgEl = document.getElementById('result-msg');
        const speakEnBtn = document.getElementById('speak-en-btn');

        if (wordList.length === 0) {
            if (enWordEl) enWordEl.innerText = "此分類目前沒有單字。";
            if (hintWordEl) hintWordEl.innerText = "";
            if (choicesContainer) choicesContainer.innerHTML = "";
            if (speakEnBtn) speakEnBtn.disabled = true;
            return;
        }

        if (currentIndex >= wordList.length) {
            showSummary();
            return;
        }

        isLocking = false;
        if (speakEnBtn) speakEnBtn.disabled = false;
        if (resultMsgEl) resultMsgEl.innerText = "";
        if (choicesContainer) choicesContainer.innerHTML = "";

        const currentWord = wordList[currentIndex];
        if (enWordEl) enWordEl.innerText = currentWord.en;
        if (hintWordEl) hintWordEl.innerText = currentWord.hint ? `提示：${currentWord.hint}` : "";
        if (progressBarEl) progressBarEl.innerText = `進度: ${currentIndex + 1} / ${wordList.length}`;
        
        // 🔊 自動播放英文發音
        speak(currentWord.en);

        // 🧠 生成四選一選項邏輯
        const choices = generateMultipleChoices(currentWord);
        
        // 渲染 4 個按鈕
        choices.forEach(chineseText => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = chineseText;
            btn.addEventListener('click', () => handleChoiceClick(btn, chineseText, currentWord.ch));
            choicesContainer.appendChild(btn);
        });
    }

    // 隨機抽取另外三個中文當做錯誤誘答選項
    function generateMultipleChoices(correctWord) {
        // 過濾出與正確答案不同中文的所有其他單字中文
        let wrongPool = wordList
            .filter(w => w.ch.trim() !== correctWord.ch.trim())
            .map(w => w.ch.trim());
        
        // 移除重複的中文
        wrongPool = [...new Set(wrongPool)];
        
        // 打亂錯誤池子並抽出 3 個
        wrongPool.sort(() => Math.random() - 0.5);
        let selectedWrongs = wrongPool.slice(0, 3);
        
        // 湊成四個選項 (正確 + 3個錯誤)
        let finalChoices = [correctWord.ch.trim(), ...selectedWrongs];
        
        // 再打亂這 4 個選項的排序，避免正確答案每次都在第一個
        finalChoices.sort(() => Math.random() - 0.5);
        return finalChoices;
    }

    // 處理點選答案
    function handleChoiceClick(clickedBtn, selectedText, correctText) {
        if (isLocking) return;

        const resultMsgEl = document.getElementById('result-msg');
        
        if (selectedText === correctText) {
            // 答對了
            isLocking = true;
            clickedBtn.classList.add('correct');
            if (resultMsgEl) {
                resultMsgEl.className = "result success";
                resultMsgEl.innerText = "⭕ 完全正確！";
            }
            
            // 答對後，將其他所有按鈕鎖定
            disableAllChoiceButtons();

            // 延遲 1 秒自動進入下一題
            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 1000);
        } else {
            // 答錯了
            clickedBtn.classList.add('incorrect');
            clickedBtn.disabled = true; // 答錯的按鈕反灰不能重複點
            if (resultMsgEl) {
                resultMsgEl.className = "result error";
                resultMsgEl.innerText = "❌ 答錯了，再試試看其他選項！";
            }
        }
    }

    function disableAllChoiceButtons() {
        const buttons = document.querySelectorAll('.choice-btn');
        buttons.forEach(btn => btn.disabled = true);
    }

    function showSummary() {
        const exerciseSection = document.getElementById('exercise-section');
        exerciseSection.innerHTML = `
            <h3 class="summary-title">🎉 恭喜完成本區選擇測驗！</h3>
            <p>您已成功完成該分類下的所有單字挑戰。</p>
            <button class="action-btn" onclick="restoreQuizUI();">重新選題挑戰</button>
        `;
    }

    function restoreQuizUI() {
        const exerciseSection = document.getElementById('exercise-section');
        exerciseSection.innerHTML = `
            <div class="progress-text" id="progress-bar">進度: 0 / 0</div>
            <div class="word-display" id="en-word">Loading...</div>
            <div class="hint-display" id="hint-word">提示載入中...</div>
            <div class="btn-group">
                <button class="audio-btn" id="speak-en-btn" disabled>🔊 發音 (Enter)</button>
            </div>
            <div class="choices-grid" id="choices-container"></div>
            <div class="result" id="result-msg"></div>
        `;
        bindEvents();
        loadWordsFromSupabase();
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }
</script>

</body>
</html>
