<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字選擇題測驗</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.1/slimselect.min.css" />
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: none; 
        }
        h2 { margin-top: 0; color: #1a1a1a; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; }
        
        .user-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e2e8f0;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .btn-logout { background-color: #ef4444; padding: 4px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer;}
        .btn-logout:hover { background-color: #dc2626; }

        .selector-group {
            margin: 15px 0;
            display: block;
            background: #fdfdfd;
            padding: 10px;
            border-radius: 4px;
            border: 1px dashed #cbd5e1;
        }

        .selector-group label {
            display: block;
            font-weight: bold;
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
        }

        /* 確保 Slim Select 元件外觀寬度正常 */
        .ss-main {
            width: 100%;
            font-size: 15px;
            margin: 0;
            text-align: left;
        }

        select {
            padding: 8px 12px;
            font-size: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        .question-box { 
            font-size: 26px; 
            font-weight: bold; 
            margin: 25px 0 15px 0; 
            color: #2c3e50; 
            text-align: center;
            background: #f8fafc;
            padding: 20px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
        }

        /* 四選一按鈕群組 */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 20px 0;
        }
        .option-btn {
            padding: 14px 20px;
            font-size: 17px;
            text-align: left;
            background-color: #ffffff;
            color: #334155;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .option-btn:hover:not(:disabled) { 
            background-color: #f1f5f9; 
            border-color: #cbd5e1; 
        }
        
        /* 答案反饋顏色 */
        .option-btn.correct { 
            background-color: #10b981 !important; 
            color: white !important; 
            border-color: #059669 !important; 
        }
        .option-btn.incorrect { 
            background-color: #ef4444 !important; 
            color: white !important; 
            border-color: #dc2626 !important; 
        }

        button.btn-audio { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold;}
        button.btn-audio:hover { background-color: #27ae60; }
        button.btn-action { background-color: #3498db; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button.btn-action:hover { background-color: #2980b9; }

        .result { margin-top: 20px; font-size: 18px; font-weight: bold; min-height: 27px; text-align: center; }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
        .score-board { margin-top: 20px; font-size: 14px; color: #555; display: flex; justify-content: space-between; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/slim-select/2.8.1/slimselect.min.js"></script>
</head>
<body>

<div class="container" id="app-container">
    <h2>🧩 英文單字四選一測驗 (看英選中)</h2>
    
    <div id="user-bar" class="user-info-bar">
        <span>👤 學生：<span id="user-email-display">載入中...</span></span>
        <button id="logout-btn" class="btn-logout">登出</button>
    </div>

    <div id="main-quiz-interface">
        <div class="selector-group">
            <label for="data-select">選擇單字分類 (Category)：</label>
            <select id="data-select">
                <option value="">正在從雲端同步分類...</option>
            </select>
        </div>

        <div id="quiz-section">
            <div class="score-board">
                <span id="progress">進度：0 / 0</span>
                <span id="score">即時正確率：0%</span>
            </div>
            
            <div class="question-box" id="question-word">單字載入中...</div>
            
            <div style="margin-bottom: 15px; text-align: center;">
                <button class="btn-audio" id="audio-btn">🔊 聽發音</button>
            </div>

            <div class="options-group" id="options-container">
                <button class="option-btn">選項 1</button>
                <button class="option-btn">選項 2</button>
                <button class="option-btn">選項 3</button>
                <button class="option-btn">選項 4</button>
            </div>

            <div id="result-message" class="result"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    
    let supabaseClient = null;
    let currentUser = null;
    let slimSelectInstance = null; // 儲存 Slim Select 實例

    let wordList = [];          // 該關卡的所有單字
    let allPoolWords = [];      // 用來當作干擾項的完整字庫
    let currentIndex = 0;
    let correctCount = 0;
    let attemptedCount = 0;
    let isLocking = false;      
    let isCurrentQuestionWrong = false; // 紀錄當前這題有沒有猜錯過

    // 🌟 新增：儲存錯題與時間的全域變數
    let wrongWordsInQuiz = [];
    let quizStartTime = null;

    window.onload = async function() {
        if (typeof window.supabase === 'undefined') {
            alert("⚠️ 系統連線失敗！");
            return;
        }
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user) {
            currentUser = session.user;
            document.getElementById('user-email-display').innerText = currentUser.email;
            document.getElementById('app-container').style.display = 'block';
            
            bindEvents();
            await loadCategoriesFromSupabase();
            await fetchAllPoolWords(); // 預先載入大字庫做錯題選項
        } else {
            window.location.href = 'login.html';
        }
    };

    function bindEvents() {
        document.getElementById('logout-btn').addEventListener('click', () => {
            supabaseClient.auth.signOut().then(() => window.location.href = 'login.html');
        });
        document.getElementById('data-select').addEventListener('change', loadWordsFromSupabase);
        document.getElementById('audio-btn').addEventListener('click', speakCurrentWord);
    }

    async function fetchAllPoolWords() {
        const { data } = await supabaseClient.from('words').select('ch');
        if (data) allPoolWords = data.map(w => w.ch);
    }

    async function loadCategoriesFromSupabase() {
        const dataSelect = document.getElementById('data-select');
        const { data, error } = await supabaseClient
            .from('categories')
            .select('code, name')
            .order('created_at', { ascending: true });

        if (error) {
            alert(`載入單字庫分類失敗：${error.message}`);
            return;
        }

        // 若已有實例先銷毀
        if (slimSelectInstance) {
            slimSelectInstance.destroy();
        }

        dataSelect.innerHTML = '';
        
        // 插入 data-placeholder 屬性的空選項
        const placeholderOpt = document.createElement('option');
        placeholderOpt.setAttribute('data-placeholder', 'true');
        placeholderOpt.value = '';
        placeholderOpt.innerText = '請選擇或搜尋分類...';
        dataSelect.appendChild(placeholderOpt);

        if (data && data.length > 0) {
            data.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.code;
                opt.innerText = `${cat.name} (${cat.code})`;
                dataSelect.appendChild(opt);
            });
            
            // 預設指向第一個實際的雲端分類
            dataSelect.value = data[0].code;

            // 初始化 Slim Select (參數與 typing.html 完全一致)
            slimSelectInstance = new SlimSelect({
                select: '#data-select',
                settings: {
                    showSearch: true,           
                    searchHighlight: true,      
                    placeholderText: '🔍 請選擇或搜尋分類...',
                    searchPlaceholder: '輸入分類名稱或代碼進行搜尋...',
                    searchText: '找不到相符的分類 😢'
                }
            });

            loadWordsFromSupabase();
        } else {
            dataSelect.innerHTML = '<option value="">⚠️ 雲端目前未設定任何分類</option>';
            document.getElementById('question-word').textContent = "請先至後台新增分類";
        }
    }

    async function loadWordsFromSupabase() {
        if (!supabaseClient) return;
        const targetCategory = document.getElementById('data-select').value;
        if (!targetCategory) return;

        document.getElementById('question-word').innerText = "連線載入中...";

        const { data, error } = await supabaseClient.from('words').select('*').eq('category_code', targetCategory);
        if (error || !data || data.length === 0) {
            document.getElementById('question-word').innerText = "⚠️ 此分類暫無單字";
            return;
        }

        wordList = data.sort(() => Math.random() - 0.5);
        
        // 🌟 新增：新一輪選擇題測驗開始，初始化時間與錯題庫
        wrongWordsInQuiz = [];
        quizStartTime = new Date();

        initQuiz();
    }

    function initQuiz() {
        currentIndex = 0;
        correctCount = 0;
        attemptedCount = 0;
        isLocking = false;
        document.getElementById('score').innerText = `即時正確率：0%`;
        showQuestion();
    }

    function showQuestion() {
        if (currentIndex >= wordList.length) {
            showSummary();
            return;
        }

        isLocking = false;
        isCurrentQuestionWrong = false; // 重置單題錯誤狀態
        document.getElementById('result-message').innerText = '';
        document.getElementById('progress').innerText = `進度：${currentIndex + 1} / ${wordList.length}`;

        const currentWord = wordList[currentIndex];
        document.getElementById('question-word').innerText = currentWord.en; // 秀出英文

        // 自動發音
        speak(currentWord.en);

        // 製造四選一選項 (1個正確中文 + 3個隨機干擾中文)
        const options = [currentWord.ch];
        const wrongPool = allPoolWords.filter(ch => ch !== currentWord.ch);
        const shuffledWrong = wrongPool.sort(() => Math.random() - 0.5);
        
        for (let i = 0; i < 3; i++) {
            if (shuffledWrong[i]) options.push(shuffledWrong[i]);
        }
        // 再次打亂四個選項
        options.sort(() => Math.random() - 0.5);

        // 渲染按鈕
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        options.forEach(optText => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = optText;
            btn.addEventListener('click', () => handleChoiceClick(btn, optText, currentWord.ch));
            container.appendChild(btn);
        });
    }

    function handleChoiceClick(clickedBtn, selectedText, correctText) {
        if (isLocking) return;

        const resultMsgEl = document.getElementById('result-message');

        if (selectedText === correctText) {
            // 答對
            isLocking = true;
            clickedBtn.classList.add('correct');
            resultMsgEl.className = "result success";
            resultMsgEl.innerText = "⭕ 回答正確！";

            // 全功能選項鎖定
            disableAllOptions();

            if (!isCurrentQuestionWrong) {
                correctCount++; // 第一次就選對才算得分
            }
            attemptedCount++;
            updateScoreBoard();

            setTimeout(() => {
                currentIndex++;
                showQuestion();
            }, 1500);

        } else {
            // 答錯
            clickedBtn.classList.add('incorrect');
            clickedBtn.disabled = true; // 點錯的按鈕反灰鎖定
            resultMsgEl.className = "result error";
            resultMsgEl.innerText = "❌ 答錯了，再試試看其他選項！";

            // 🌟 新增：只要點錯，立刻將當前這題的單字記錄到錯題陣列中（確保不重複加入）
            isCurrentQuestionWrong = true;
            const currentWord = wordList[currentIndex];
            if (!wrongWordsInQuiz.some(w => w.id === currentWord.id)) {
                wrongWordsInQuiz.push(currentWord);
            }
        }
    }

    function disableAllOptions() {
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(b => b.disabled = true);
    }

    function updateScoreBoard() {
        const rate = attemptedCount === 0 ? 0 : Math.round((correctCount / attemptedCount) * 100);
        document.getElementById('score').innerText = `即時正確率：${rate}%`;
    }

    async function showSummary() {
        const quizSection = document.getElementById('quiz-section');
        let rate = wordList.length === 0 ? 0 : Math.round((correctCount / wordList.length) * 100);

        // 🌟 新增：在結算畫面渲染前，打包成績與錯題 ID 陣列同步回傳至 `quiz_logs`
        if (wordList.length > 0 && supabaseClient) {
            const quizEndTime = new Date();
            const targetCategory = document.getElementById('data-select').value;
            
            const { error } = await supabaseClient
                .from('quiz_logs')
                .insert({
                    user_id: currentUser.id,
                    quiz_type: 'multiple_choice', // 標註四選一類型
                    category_code: targetCategory,
                    total_questions: wordList.length,
                    correct_answers: correctCount,
                    accuracy_rate: rate,
                    start_time: quizStartTime ? quizStartTime.toISOString() : quizEndTime.toISOString(),
                    end_time: quizEndTime.toISOString(),
                    wrong_word_ids: wrongWordsInQuiz.map(w => w.id) // 🌟 核心：上傳所有點錯題目的 ID 陣列
                });

            if (error) console.error("選擇題紀錄寫入失敗:", error.message);
        }

        window.loadWordsFromSupabase = loadWordsFromSupabase;

        quizSection.innerHTML = `
            <h3 class="success">🎉 測驗完成！</h3>
            <p style="font-size:16px; text-align:center;">得分表現：答對 ${correctCount} 題 / 共 ${wordList.length} 題</p>
            <p style="font-size:18px; text-align:center; font-weight:bold;">總正確率：${rate}%</p>
            <div style="text-align:center; margin-top:20px;">
                <button class="btn-action" onclick="window.loadWordsFromSupabase()">再試一次 🔄</button>
                <a href="history.html" style="display:inline-block; margin-left:10px; padding:12px 20px; background-color:#7f8c8d; color:white; text-decoration:none; border-radius:4px; font-size:16px;">查看紀錄 📊</a>
            </div>
        `;
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }

    function speakCurrentWord() {
        if (wordList[currentIndex]) speak(wordList[currentIndex].en);
    }
</script>

</body>
</html>
