<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學科與單元分類管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #334155;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --success-color: #16a34a;
            --error-color: #dc2626;
            --edit-color: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }
        header { margin-bottom: 30px; text-align: center; }
        header h1 { font-size: 26px; color: #0f172a; margin-bottom: 8px; }
        header p { color: var(--text-muted); font-size: 14px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #0f172a;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: 500; margin-bottom: 6px; font-size: 14px; }
        
        input[type="text"] {
            width: 100%; padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 14px;
            transition: all 0.2s;
        }
        input[type="text"]:focus {
            outline: none; border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 18px; font-size: 14px; font-weight: 500;
            border-radius: 6px; border: none; cursor: pointer; transition: background-color 0.2s;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-edit { background-color: var(--edit-color); color: white; }
        .btn-edit:hover { background-color: #d97706; }
        .btn-secondary { background-color: #e2e8f0; color: #475569; margin-right: 8px; }

        .form-actions { display: flex; justify-content: flex-end; margin-top: 10px; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px 14px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f8fafc; font-weight: 700; color: #1e293b; }
        tr:hover { background-color: #f8fafc; }
        
        .action-btn { padding: 4px 8px; font-size: 12px; border-radius: 4px; border: none; cursor: pointer; }
        .btn-table-edit { background-color: #fef3c7; color: #d97706; }
        .btn-table-edit:hover { background-color: #fde68a; }

        .status-msg { padding: 12px; border-radius: 6px; margin-top: 14px; font-size: 14px; display: none; }
        .status-msg.success { display: block; background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .status-msg.error { display: block; background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        
        .badge { background-color: #e0f2fe; color: #0369a1; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>學科與單元分類管理系統</h1>
        <p>🟢 系統已成功自動連線至您的 Supabase 專案 (cebkdvpquzzlvyrhinto)</p>
    </header>

    <div class="card">
        <div class="card-title" id="formPurpose">✨ 新增學科單元</div>
        <form id="categoryForm" onsubmit="handleSubmit(event)">
            <input type="hidden" id="categoryId" value="">
            
            <div class="grid-2">
                <div class="form-group">
                    <label for="subjectName">學科名稱</label>
                    <input type="text" id="subjectName" placeholder="例如：計算機概論、會計學" required>
                </div>
                <div class="form-group">
                    <label for="unitName">單元名稱</label>
                    <input type="text" id="unitName" placeholder="例如：第一章 緒論" required>
                </div>
            </div>
            
            <div class="form-actions">
                <button type="button" id="cancelEditBtn" class="btn btn-secondary" style="display: none;" onclick="resetForm()">取消編輯</button>
                <button type="submit" id="submitBtn" class="btn btn-primary">確認新增</button>
            </div>
        </form>
        <div id="formStatus" class="status-msg"></div>
    </div>

    <div class="card">
        <div class="card-title">📂 目前已建立的分類列表</div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 100px;">分類 ID</th>
                        <th>學科名稱</th>
                        <th>單元名稱</th>
                        <th style="width: 100px; text-align: center;">操作</th>
                    </tr>
                </thead>
                <tbody id="categoryTableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--text-muted);">正在載入資料中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 直接內嵌您提供的 Project ID 與 API KEY 金鑰
    const SUPABASE_URL = "https://cebkdvpquzzlvyrhinto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_nMJezib-NsDHpvDSLLXHaw_9005bSpQ";
    
    // 初始化 Supabase 用戶端
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let isEditing = false;

    // 網頁開啟後自動加載資料列表
    document.addEventListener("DOMContentLoaded", () => {
        fetchCategories();
    });

    // 撈取分類列表
    async function fetchCategories() {
        const tbody = document.getElementById("categoryTableBody");
        
        const { data, error } = await supabaseClient
            .from('categories')
            .select('*')
            .order('id', { ascending: true });

        if (error) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--error-color);">資料載入失敗: ${error.message}</td></tr>`;
            return;
        }

        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-muted);">目前沒有任何分類資料。</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(item => `
            <tr>
                <td><span class="badge">ID: ${item.id}</span></td>
                <td><strong>${escapeHtml(item.subject_name)}</strong></td>
                <td>${escapeHtml(item.unit_name)}</td>
                <td style="text-align: center;">
                    <button class="action-btn btn-table-edit" onclick="startEdit(${item.id}, '${escapeJs(item.subject_name)}', '${escapeJs(item.unit_name)}')">
                        ✏️ 編輯
                    </button>
                </td>
            </tr>
        `).join('');
    }

    // 表單提交（處理新增與更新）
    async function handleSubmit(event) {
        event.preventDefault();
        const statusDiv = document.getElementById("formStatus");
        const id = document.getElementById("categoryId").value;
        const subject_name = document.getElementById("subjectName").value.trim();
        const unit_name = document.getElementById("unitName").value.trim();

        statusDiv.style.display = "none";

        if (isEditing) {
            const { error } = await supabaseClient
                .from('categories')
                .update({ subject_name, unit_name })
                .eq('id', id);

            if (error) {
                showStatus(statusDiv, `更新失敗：${error.message}`, "error");
            } else {
                showStatus(statusDiv, "🎉 分類更新成功！", "success");
                resetForm();
                fetchCategories();
            }
        } else {
            const { error } = await supabaseClient
                .from('categories')
                .insert([{ subject_name, unit_name }]);

            if (error) {
                showStatus(statusDiv, `新增失敗：${error.message}`, "error");
            } else {
                showStatus(statusDiv, "🎉 成功新增學科單元分類！", "success");
                resetForm();
                fetchCategories();
            }
        }
    }

    function startEdit(id, subjectName, unitName) {
        isEditing = true;
        document.getElementById("formPurpose").innerText = "✏️ 編輯學科單元 (ID: " + id + ")";
        document.getElementById("formPurpose").style.borderLeftColor = "var(--edit-color)";
        document.getElementById("submitBtn").innerText = "儲存修改";
        document.getElementById("submitBtn").className = "btn btn-edit";
        document.getElementById("cancelEditBtn").style.display = "inline-flex";

        document.getElementById("categoryId").value = id;
        document.getElementById("subjectName").value = subjectName;
        document.getElementById("unitName").value = unitName;
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
        isEditing = false;
        document.getElementById("formPurpose").innerText = "✨ 新增學科單元";
        document.getElementById("formPurpose").style.borderLeftColor = "var(--primary-color)";
        document.getElementById("submitBtn").innerText = "確認新增";
        document.getElementById("submitBtn").className = "btn btn-primary";
        document.getElementById("cancelEditBtn").style.display = "none";
        document.getElementById("categoryForm").reset();
        document.getElementById("categoryId").value = "";
    }

    function showStatus(element, message, type) {
        element.className = `status-msg ${type}`;
        element.innerText = message;
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function escapeJs(str) {
        return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
    }
</script>

</body>
</html>
