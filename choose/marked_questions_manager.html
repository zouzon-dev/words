<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錯題標記管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', '微軟正黑體', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-group label {
            font-weight: 600;
            color: #333;
        }

        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-warning {
            background: #ff9800;
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-card .number {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-card .label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .questions-list {
            display: grid;
            gap: 20px;
        }

        .question-card {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            background: #f9f9f9;
        }

        .question-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
            gap: 15px;
        }

        .question-id {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .question-marks {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .mark-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .mark-wrong {
            background: #ffcdd2;
            color: #c62828;
        }

        .mark-bookmark {
            background: #fff9c4;
            color: #f57f17;
        }

        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .question-options {
            display: grid;
            gap: 10px;
            margin: 15px 0;
            margin-left: 20px;
        }

        .option {
            display: flex;
            align-items: start;
            gap: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            border: 1px solid #ddd;
        }

        .option-label {
            font-weight: 600;
            color: #667eea;
            min-width: 30px;
        }

        .option-text {
            flex: 1;
            color: #555;
        }

        .option.correct .option-label {
            color: #4caf50;
        }

        .option.correct {
            background: #f1f8e9;
            border-color: #4caf50;
        }

        .explanation {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 15px;
            border-radius: 4px;
            margin: 15px 0;
            font-size: 0.95em;
            color: #2e7d32;
        }

        .explanation-label {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .question-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            font-size: 0.9em;
        }

        .edit-form {
            background: #f5f5f5;
            border: 2px dashed #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1em;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .form-group-checkbox input[type="checkbox"] {
            width: auto;
            cursor: pointer;
        }

        .form-group-checkbox label {
            margin: 0;
            cursor: pointer;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .empty-state-title {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #666;
        }

        .empty-state-text {
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .pagination button {
            padding: 8px 16px;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            border-left: 4px solid #4caf50;
        }

        .toast.error {
            border-left: 4px solid #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .filters {
                flex-direction: column;
            }

            .button-group {
                width: 100%;
                margin-left: 0;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .question-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 錯題標記管理</h1>
            <p>追蹤和管理做錯或收藏的題目，幫助你更有效地複習</p>
        </div>

        <div class="content">
            <!-- 統計卡片 -->
            <div class="stats">
                <div class="stat-card">
                    <div class="label">錯題總數</div>
                    <div class="number" id="totalWrong">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">收藏題目</div>
                    <div class="number" id="totalBookmark">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">全部標記</div>
                    <div class="number" id="totalMarked">0</div>
                </div>
                <div class="stat-card">
                    <div class="label">複習進度</div>
                    <div class="number" id="reviewProgress">0%</div>
                </div>
            </div>

            <!-- 篩選區 -->
            <div class="filters">
                <div class="filter-group">
                    <label for="filterType">顯示類型：</label>
                    <select id="filterType">
                        <option value="all">全部</option>
                        <option value="wrong">只看錯題</option>
                        <option value="bookmark">只看收藏</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="filterCategory">科目/單元：</label>
                    <select id="filterCategory">
                        <option value="">全部</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="searchKeyword">搜尋：</label>
                    <input type="text" id="searchKeyword" placeholder="搜尋題目...">
                </div>

                <div class="button-group">
                    <button class="btn-secondary" id="resetFilters">重置</button>
                    <button class="btn-primary" id="exportData">匯出</button>
                </div>
            </div>

            <!-- 題目列表 -->
            <div class="questions-list" id="questionsList"></div>

            <!-- 空狀態 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">📚</div>
                <div class="empty-state-title">沒有標記的題目</div>
                <div class="empty-state-text">開始做題測驗，系統會自動記錄你的錯題</div>
            </div>

            <!-- 分頁 -->
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <!-- 編輯模態窗 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">編輯題目</div>
            <div class="edit-form" id="editForm">
                <div class="form-group">
                    <label>題目ID</label>
                    <input type="text" id="editQID" readonly>
                </div>
                <div class="form-group">
                    <label for="editQuestion">題目敘述</label>
                    <textarea id="editQuestion"></textarea>
                </div>
                <div class="form-group">
                    <label for="editOptA">選項 A</label>
                    <input type="text" id="editOptA">
                </div>
                <div class="form-group">
                    <label for="editOptB">選項 B</label>
                    <input type="text" id="editOptB">
                </div>
                <div class="form-group">
                    <label for="editOptC">選項 C</label>
                    <input type="text" id="editOptC">
                </div>
                <div class="form-group">
                    <label for="editOptD">選項 D</label>
                    <input type="text" id="editOptD">
                </div>
                <div class="form-group">
                    <label for="editCorrect">正確答案</label>
                    <select id="editCorrect">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                        <option value="D">D</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editExplanation">詳解</label>
                    <textarea id="editExplanation"></textarea>
                </div>
                <div class="form-group-checkbox">
                    <input type="checkbox" id="editIsWrong">
                    <label for="editIsWrong">標記為錯題</label>
                </div>
                <div class="form-group-checkbox">
                    <input type="checkbox" id="editIsBookmark">
                    <label for="editIsBookmark">標記為收藏</label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancelEdit">取消</button>
                <button class="btn-primary" id="saveEdit">保存</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 資料管理 ====================
        class MarkedQuestionsManager {
            constructor() {
                this.questions = [];
                this.filteredQuestions = [];
                this.currentPage = 1;
                this.itemsPerPage = 5;
                this.editingQuestionId = null;
                this.init();
            }

            async init() {
                this.loadData();
                this.setupEventListeners();
                this.renderQuestions();
                this.updateStats();
            }

            loadData() {
                // 模擬資料 - 實際應從資料庫獲取
                this.questions = [
                    {
                        id: 1,
                        categoryId: 1,
                        categoryName: '計算機概論 - 第一章',
                        question: '下列何者是現代計算機的基本特點？',
                        options: {
                            A: '只能處理數值計算',
                            B: '能處理各種資訊，具有邏輯判斷能力',
                            C: '計算速度很慢',
                            D: '必須由人工操作'
                        },
                        correct: 'B',
                        explanation: '現代計算機具有多功能性，不只能進行數值計算，還能進行邏輯判斷、文字處理等各種資訊處理。',
                        isWrongHistory: true,
                        isBookmarked: false,
                        timestamp: new Date('2026-07-08')
                    },
                    {
                        id: 2,
                        categoryId: 1,
                        categoryName: '計算機概論 - 第一章',
                        question: '計算機硬體的五大組成部分不包括下列哪一項？',
                        options: {
                            A: '控制器',
                            B: '運算器',
                            C: '編譯器',
                            D: '存儲器'
                        },
                        correct: 'C',
                        explanation: '計算機硬體的五大基本部分是：控制器、運算器、存儲器、輸入設備和輸出設備。編譯器是軟體，不是硬體。',
                        isWrongHistory: true,
                        isBookmarked: true,
                        timestamp: new Date('2026-07-09')
                    },
                    {
                        id: 3,
                        categoryId: 2,
                        categoryName: '會計學 - 第二章',
                        question: '資產負債表中，資產 = 負債 + 什麼？',
                        options: {
                            A: '利潤',
                            B: '收入',
                            C: '所有者權益',
                            D: '成本'
                        },
                        correct: 'C',
                        explanation: '根據會計基本等式：資產 = 負債 + 所有者權益。這是會計的基礎原理。',
                        isWrongHistory: false,
                        isBookmarked: true,
                        timestamp: new Date('2026-07-10')
                    }
                ];

                // 從 localStorage 讀取本地修改
                const saved = localStorage.getItem('markedQuestions');
                if (saved) {
                    try {
                        const savedQuestions = JSON.parse(saved);
                        this.questions = this.mergeData(this.questions, savedQuestions);
                    } catch (e) {
                        console.error('Failed to load saved data:', e);
                    }
                }
            }

            mergeData(original, saved) {
                return original.map(q => {
                    const savedQ = saved.find(s => s.id === q.id);
                    return savedQ ? { ...q, ...savedQ } : q;
                });
            }

            setupEventListeners() {
                document.getElementById('filterType').addEventListener('change', () => this.applyFilters());
                document.getElementById('filterCategory').addEventListener('change', () => this.applyFilters());
                document.getElementById('searchKeyword').addEventListener('input', () => this.applyFilters());
                document.getElementById('resetFilters').addEventListener('click', () => this.resetFilters());
                document.getElementById('exportData').addEventListener('click', () => this.exportData());
                document.getElementById('cancelEdit').addEventListener('click', () => this.closeEditModal());
                document.getElementById('saveEdit').addEventListener('click', () => this.saveEdits());

                // 加載分類選項
                this.loadCategories();
            }

            loadCategories() {
                const categories = [...new Set(this.questions.map(q => ({ id: q.categoryId, name: q.categoryName })))];
                const select = document.getElementById('filterCategory');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id;
                    option.textContent = cat.name;
                    select.appendChild(option);
                });
            }

            applyFilters() {
                const filterType = document.getElementById('filterType').value;
                const filterCategory = document.getElementById('filterCategory').value;
                const searchKeyword = document.getElementById('searchKeyword').value.toLowerCase();

                this.filteredQuestions = this.questions.filter(q => {
                    let typeMatch = true;
                    if (filterType === 'wrong') typeMatch = q.isWrongHistory;
                    if (filterType === 'bookmark') typeMatch = q.isBookmarked;

                    const categoryMatch = !filterCategory || q.categoryId == filterCategory;
                    const searchMatch = !searchKeyword || 
                        q.question.toLowerCase().includes(searchKeyword) ||
                        Object.values(q.options).some(opt => opt.toLowerCase().includes(searchKeyword));

                    return typeMatch && categoryMatch && searchMatch;
                });

                this.currentPage = 1;
                this.renderQuestions();
            }

            resetFilters() {
                document.getElementById('filterType').value = 'all';
                document.getElementById('filterCategory').value = '';
                document.getElementById('searchKeyword').value = '';
                this.applyFilters();
                this.showToast('篩選已重置', 'success');
            }

            updateStats() {
                const totalWrong = this.questions.filter(q => q.isWrongHistory).length;
                const totalBookmark = this.questions.filter(q => q.isBookmarked).length;
                const totalMarked = this.questions.filter(q => q.isWrongHistory || q.isBookmarked).length;
                const reviewProgress = totalMarked > 0 ? Math.round((totalMarked / this.questions.length) * 100) : 0;

                document.getElementById('totalWrong').textContent = totalWrong;
                document.getElementById('totalBookmark').textContent = totalBookmark;
                document.getElementById('totalMarked').textContent = totalMarked;
                document.getElementById('reviewProgress').textContent = reviewProgress + '%';
            }

            renderQuestions() {
                const container = document.getElementById('questionsList');
                const emptyState = document.getElementById('emptyState');

                if (this.filteredQuestions.length === 0) {
                    container.innerHTML = '';
                    emptyState.style.display = 'block';
                    document.getElementById('pagination').innerHTML = '';
                    return;
                }

                emptyState.style.display = 'none';

                const start = (this.currentPage - 1) * this.itemsPerPage;
                const end = start + this.itemsPerPage;
                const pageQuestions = this.filteredQuestions.slice(start, end);

                container.innerHTML = pageQuestions.map(q => this.createQuestionCard(q)).join('');
                this.renderPagination();
            }

            createQuestionCard(q) {
                const correctOptionKey = q.correct;
                const correctOptionText = q.options[correctOptionKey];

                return `
                    <div class="question-card" data-id="${q.id}">
                        <div class="question-header">
                            <div>
                                <span class="question-id">第 ${q.id} 題</span>
                                <div class="question-marks" style="margin-top: 8px;">
                                    ${q.isWrongHistory ? '<span class="mark-badge mark-wrong">❌ 錯題</span>' : ''}
                                    ${q.isBookmarked ? '<span class="mark-badge mark-bookmark">⭐ 收藏</span>' : ''}
                                </div>
                            </div>
                            <div style="font-size: 0.85em; color: #999;">
                                ${new Date(q.timestamp).toLocaleDateString('zh-TW')}
                            </div>
                        </div>

                        <div class="question-text">${q.question}</div>

                        <div class="question-options">
                            ${Object.entries(q.options).map(([key, text]) => `
                                <div class="option ${key === correctOptionKey ? 'correct' : ''}">
                                    <span class="option-label">${key}</span>
                                    <span class="option-text">${text}</span>
                                    ${key === correctOptionKey ? '<span style="margin-left: auto; color: #4caf50;">✓ 正確</span>' : ''}
                                </div>
                            `).join('')}
                        </div>

                        ${q.explanation ? `
                            <div class="explanation">
                                <div class="explanation-label">📖 詳解</div>
                                <div>${q.explanation}</div>
                            </div>
                        ` : ''}

                        <div class="question-actions">
                            <button class="action-btn btn-primary" onclick="manager.openEditModal(${q.id})">
                                ✏️ 編輯
                            </button>
                            <button class="action-btn btn-warning" onclick="manager.toggleMark(${q.id}, 'wrong')">
                                ${q.isWrongHistory ? '❌' : '⭕'} 錯題
                            </button>
                            <button class="action-btn btn-warning" onclick="manager.toggleMark(${q.id}, 'bookmark')">
                                ${q.isBookmarked ? '⭐' : '☆'} 收藏
                            </button>
                            <button class="action-btn btn-danger" onclick="manager.deleteQuestion(${q.id})">
                                🗑️ 刪除
                            </button>
                        </div>
                    </div>
                `;
            }

            renderPagination() {
                const totalPages = Math.ceil(this.filteredQuestions.length / this.itemsPerPage);
                const pagination = document.getElementById('pagination');
                pagination.innerHTML = '';

                if (totalPages <= 1) return;

                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    btn.className = i === this.currentPage ? 'btn-secondary active' : 'btn-secondary';
                    btn.onclick = () => {
                        this.currentPage = i;
                        this.renderQuestions();
                    };
                    pagination.appendChild(btn);
                }
            }

            toggleMark(id, type) {
                const question = this.questions.find(q => q.id === id);
                if (question) {
                    if (type === 'wrong') {
                        question.isWrongHistory = !question.isWrongHistory;
                    } else if (type === 'bookmark') {
                        question.isBookmarked = !question.isBookmarked;
                    }
                    this.saveToLocalStorage();
                    this.applyFilters();
                    this.updateStats();
                    this.showToast('標記已更新', 'success');
                }
            }

            openEditModal(id) {
                const question = this.questions.find(q => q.id === id);
                if (!question) return;

                this.editingQuestionId = id;
                document.getElementById('editQID').value = question.id;
                document.getElementById('editQuestion').value = question.question;
                document.getElementById('editOptA').value = question.options.A;
                document.getElementById('editOptB').value = question.options.B;
                document.getElementById('editOptC').value = question.options.C;
                document.getElementById('editOptD').value = question.options.D;
                document.getElementById('editCorrect').value = question.correct;
                document.getElementById('editExplanation').value = question.explanation;
                document.getElementById('editIsWrong').checked = question.isWrongHistory;
                document.getElementById('editIsBookmark').checked = question.isBookmarked;

                document.getElementById('editModal').classList.add('active');
            }

            closeEditModal() {
                document.getElementById('editModal').classList.remove('active');
                this.editingQuestionId = null;
            }

            saveEdits() {
                const question = this.questions.find(q => q.id === this.editingQuestionId);
                if (!question) return;

                question.question = document.getElementById('editQuestion').value;
                question.options.A = document.getElementById('editOptA').value;
                question.options.B = document.getElementById('editOptB').value;
                question.options.C = document.getElementById('editOptC').value;
                question.options.D = document.getElementById('editOptD').value;
                question.correct = document.getElementById('editCorrect').value;
                question.explanation = document.getElementById('editExplanation').value;
                question.isWrongHistory = document.getElementById('editIsWrong').checked;
                question.isBookmarked = document.getElementById('editIsBookmark').checked;

                this.saveToLocalStorage();
                this.closeEditModal();
                this.applyFilters();
                this.updateStats();
                this.showToast('題目已保存', 'success');
            }

            deleteQuestion(id) {
                if (confirm('確定要刪除這題嗎？此操作無法撤銷。')) {
                    this.questions = this.questions.filter(q => q.id !== id);
                    this.saveToLocalStorage();
                    this.applyFilters();
                    this.updateStats();
                    this.showToast('題目已刪除', 'success');
                }
            }

            exportData() {
                const data = {
                    exportDate: new Date().toLocaleString('zh-TW'),
                    totalQuestions: this.questions.length,
                    wrongQuestions: this.questions.filter(q => q.isWrongHistory).length,
                    bookmarkedQuestions: this.questions.filter(q => q.isBookmarked).length,
                    questions: this.questions
                };

                const json = JSON.stringify(data, null, 2);
                const blob = new Blob([json], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `marked_questions_${new Date().getTime()}.json`;
                a.click();
                URL.revokeObjectURL(url);

                this.showToast('資料已匯出', 'success');
            }

            saveToLocalStorage() {
                localStorage.setItem('markedQuestions', JSON.stringify(this.questions));
            }

            showToast(message, type = 'success') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s ease reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 2000);
            }
        }

        // ==================== 初始化 ====================
        let manager;
        document.addEventListener('DOMContentLoaded', () => {
            manager = new MarkedQuestionsManager();
        });
    </script>
</body>
</html>
