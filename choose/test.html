<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上選擇題做答與評分系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success-color: #16a34a;
            --success-bg: #dcfce7;
            --error-color: #dc2626;
            --error-bg: #fee2e2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container { max-width: 800px; margin: 0 auto; }
        header { margin-bottom: 30px; text-align: center; }
        header h1 { font-size: 28px; color: #0f172a; margin-bottom: 8px; }
        header p { color: var(--text-muted); font-size: 15px; }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #0f172a;
            border-left: 4px solid var(--primary-color);
            padding-left: 10px;
        }

        label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 14px; }
        select {
            width: 100%; padding: 10px 14px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 14px; background-color: #fff; margin-bottom: 16px;
        }

        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 24px; font-size: 15px; font-weight: 500;
            border-radius: 6px; border: none; cursor: pointer; transition: all 0.2s;
            width: 100%;
        }
        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-success:hover { background-color: #15803d; }

        /* 考題介面樣式 */
        .question-block {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            position: relative;
        }
        .question-block:last-child { border-bottom: none; }
        .question-text { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: #0f172a; }
        
        .options-group { display: flex; flex-direction: column; gap: 8px; }
        .option-label {
            display: flex; align-items: center; padding: 10px 14px;
            border: 1px solid var(--border-color); border-radius: 6px;
            cursor: pointer; transition: background-color 0.15s; font-size: 14px;
        }
        .option-label:hover { background-color: #f1f5f9; }
        .option-label input { margin-right: 10px; transform: scale(1.1); }

        /* 答案與詳解結果樣式 */
        .explanation-box {
            margin-top: 14px; padding: 12px 16px; border-radius: 6px;
            background-color: #f8fafc; border-left: 4px solid #94a3b8;
            font-size: 14px; display: none;
        }
        
        /* 答題對錯動態樣式 */
        .question-block.correct { background-color: #f0fdf4; padding: 20px; border-radius: 8px; margin-bottom: 10px; }
        .question-block.wrong { background-color: #fef2f2; padding: 20px; border-radius: 8px; margin-bottom: 10px; }
        .option-label.correct-choice { background-color: #bbf7d0; border-color: #22c55e; color: #14532d; font-weight: bold; }
        .option-label.wrong-choice { background-color: #fecaca; border-color: #ef4444; color: #7f1d1d; }

        /* 成績結算看版 */
        #scoreBoard {
            text-align: center; display: none;
            background: linear-gradient(135deg, #e0e7ff 0%, #c7d2fe 100%);
            color: #312e81; padding: 30px; border-radius: 12px; margin-bottom: 24px;
        }
        .score-number { font-size: 48px; font-weight: 800; color: #4338ca; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>線上選擇題做答與評分系統</h1>
        <p>選擇單元即可開始測驗，系統將自動記錄成績與錯題</p>
    </header>

    <div class="card" id="setupCard">
        <div class="card-title">🎯 選擇測驗範圍</div>
        <label for="categorySelect">請選擇學科與單元</label>
        <select id="categorySelect">
            <option value="" disabled selected>正在載入單元分類...</option>
        </select>
        <button class="btn btn-primary" onclick="startQuiz()">開始測驗</button>
    </div>

    <div id="scoreBoard" class="card">
        <h2>測驗結束</h2>
        <div class="score-number" id="finalScore">0 分</div>
        <p id="scoreDetail">答對 0 題 / 總共 0 題</p>
        <button class="btn btn-primary" style="margin-top: 15px; width: auto;" onclick="location.reload()">再測一次 / 更換單元</button>
    </div>

    <div class="card" id="quizCard" style="display: none;">
        <div class="card-title" id="quizTitle">題目加載中...</div>
        <form id="quizForm" onsubmit="submitQuiz(event)">
            <div id="questionsContainer">
                </div>
            <div style="margin-top: 24px;">
                <button type="submit" class="btn btn-success" id="submitBtn">提交試卷並評分</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 內嵌您的 Supabase 專案金鑰
    const SUPABASE_URL = "https://cebkdvpquzzlvyrhinto.supabase.co";
    const SUPABASE_KEY = "sb_publishable_nMJezib-NsDHpvDSLLXHaw_9005bSpQ";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 模擬當前登入的使用者 UUID (實際專案中請替換為 supabase.auth.getUser() 取得的 ID)
    // 這裡使用 Supabase 要求的標準 UUID 格式做為 Dummy 測試帳號
    const MOCK_USER_ID = "00000000-0000-0000-0000-000000000000"; 

    let currentQuestions = [];

    // 頁面載入後自動取得分類選單
    document.addEventListener("DOMContentLoaded", async () => {
        const select = document.getElementById("categorySelect");
        
        const { data, error } = await supabaseClient
            .from('categories')
            .select('*')
            .order('id', { ascending: true });

        if (error || !data || data.length === 0) {
            select.innerHTML = '<option value="" disabled>無法載入分類，請先至分類管理建立單元</option>';
            return;
        }

        select.innerHTML = data.map(c => `
            <option value="${c.id}">${escapeHtml(c.subject_name)} — ${escapeHtml(c.unit_name)}</option>
        `).join('');
    });

    // 開始測驗：抓取題目
    async function startQuiz() {
        const categoryId = document.getElementById("categorySelect").value;
        if (!categoryId) return;

        // 撈取該單元所有題目
        const { data, error } = await supabaseClient
            .from('questions')
            .select('*')
            .eq('category_id', categoryId);

        if (error) {
            alert("撈取題目失敗: " + error.message);
            return;
        }

        if (!data || data.length === 0) {
            alert("此單元目前尚未上傳任何題目，請先去上傳題庫！");
            return;
        }

        currentQuestions = data;
        
        // 隱藏設定卡片，顯示題目卡片
        document.getElementById("setupCard").style.display = "none";
        document.getElementById("quizCard").style.display = "block";
        
        const selectedText = document.getElementById("categorySelect").options[document.getElementById("categorySelect").selectedIndex].text;
        document.getElementById("quizTitle").innerText = `📝 測驗單元：${selectedText} (共 ${data.length} 題)`;

        renderQuestions(data);
    }

    // 渲染題目到 HTML 頁面
    function renderQuestions(questions) {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = questions.map((q, index) => `
            <div class="question-block" id="qBlock_${q.id}">
                <div class="question-text">${index + 1}. ${escapeHtml(q.question_text)}</div>
                <div class="options-group">
                    <label class="option-label" id="label_${q.id}_A">
                        <input type="radio" name="question_${q.id}" value="A" required> A) ${escapeHtml(q.option_a)}
                    </label>
                    <label class="option-label" id="label_${q.id}_B">
                        <input type="radio" name="question_${q.id}" value="B"> B) ${escapeHtml(q.option_b)}
                    </label>
                    <label class="option-label" id="label_${q.id}_C">
                        <input type="radio" name="question_${q.id}" value="C"> C) ${escapeHtml(q.option_c)}
                    </label>
                    <label class="option-label" id="label_${q.id}_D">
                        <input type="radio" name="question_${q.id}" value="D"> D) ${escapeHtml(q.option_d)}
                    </label>
                </div>
                <div class="explanation-box" id="expl_${q.id}">
                    <strong>💡 正確答案：${q.correct_answer}</strong><br>
                    <span style="color: var(--text-muted);">解析：${escapeHtml(q.explanation || '無詳細解答說明')}</span>
                </div>
            </div>
        `).join('');
    }

    // 提交考卷與評分邏輯
    async function submitQuiz(event) {
        event.preventDefault();
        
        // 停用提交按鈕防止重複提交
        document.getElementById("submitBtn").disabled = true;
        document.getElementById("submitBtn").innerText = "正在結算並記錄歷史成績...";

        let correctCount = 0;
        const totalQuestions = currentQuestions.length;
        const wrongQuestionIds = [];

        // 1. 逐題檢查答案並渲染對錯顏色
        currentQuestions.forEach(q => {
            const radioGroup = document.getElementsByName(`question_${q.id}`);
            let userAns = "";
            
            // 找出使用者選了哪一個
            for (let i = 0; i < radioGroup.length; i++) {
                radioGroup[i].disabled = true; // 鎖定選項不可再改
                if (radioGroup[i].checked) {
                    userAns = radioGroup[i].value;
                }
            }

            const block = document.getElementById(`qBlock_${q.id}`);
            const explBox = document.getElementById(`expl_${q.id}`);
            
            // 顯示詳解
            explBox.style.display = "block";

            if (userAns === q.correct_answer) {
                // 答對了
                correctCount++;
                block.classList.add("correct");
                document.getElementById(`label_${q.id}_${q.correct_answer}`).classList.add("correct-choice");
            } else {
                // 答錯了
                wrongQuestionIds.push(q.id);
                block.classList.add("wrong");
                // 標示出正確答案與使用者選錯的答案
                document.getElementById(`label_${q.id}_${q.correct_answer}`).classList.add("correct-choice");
                if (userAns) {
                    document.getElementById(`label_${q.id}_${userAns}`).classList.add("wrong-choice");
                }
            }
        });

        // 計算百之分制得分
        const finalScore = Math.round((correctCount / totalQuestions) * 100);

        // 2. 寫入測驗紀錄表 (quiz_records)
        const { error: recordError } = await supabaseClient
            .from('quiz_records')
            .insert([{
                user_id: MOCK_USER_ID,
                score: finalScore,
                total_questions: totalQuestions
            }]);
        
        if (recordError) console.error("成績紀錄寫入失敗:", recordError.message);

        // 3. 將寫錯的題目紀錄至錯題標記表 (marked_questions)
        if (wrongQuestionIds.length > 0) {
            // 組裝批次 upsert 資料
            const upsertData = wrongQuestionIds.map(qId => ({
                user_id: MOCK_USER_ID,
                question_id: qId,
                is_wrong_history: true
            }));

            const { error: markError } = await supabaseClient
                .from('marked_questions')
                .upsert(upsertData, { onConflict: 'user_id,question_id' });

            if (markError) console.error("錯題本更新失敗:", markError.message);
        }

        // 4. 顯示分數結算看板
        document.getElementById("scoreBoard").style.display = "block";
        document.getElementById("finalScore").innerText = `${finalScore} 分`;
        document.getElementById("scoreDetail").innerText = `答對 ${correctCount} 題 / 總共 ${totalQuestions} 題（已將 ${wrongQuestionIds.length} 筆錯題自動同步至您的錯題本）`;
        
        // 隱藏原本的提交按鈕
        document.getElementById("submitBtn").style.display = "none";
        
        // 畫面滾動到最上方看分數
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 網頁編碼防護
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }
</script>

</body>
</html>
