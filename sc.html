<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文造句練習器 (Gemini AI 檢查版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 700px;
            width: 100%;
            display: none;
        }
        
        .user-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e2e8f0;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .btn-logout {
            background-color: #ef4444;
            padding: 4px 10px;
            font-size: 12px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .btn-logout:hover {
            background-color: #dc2626;
        }

        select, textarea, input, button {
            font-size: 16px;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        button:hover {
            background-color: #45a049;
        }
        
        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Courier New', monospace;
        }

        .word-display {
            font-size: 42px;
            font-weight: bold;
            color: #2c3e50;
            margin: 20px 0 10px 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }

        .ch-display {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .audio-btn {
            background-color: #008CBA;
            margin: 0;
            flex: 1;
        }

        .audio-btn:hover {
            background-color: #007B9A;
        }
        
        .progress-text {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 10px;
        }

        .result {
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            line-height: 1.6;
            min-height: 50px;
            display: none;
        }

        .success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            display: block;
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .checking {
            display: block;
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        
        .summary-title {
            font-size: 28px;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .instruction {
            background-color: #e8f4f8;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #2c3e50;
            border-left: 4px solid #3498db;
        }

        .api-config {
            background-color: #f0f0f0;
            padding: 12px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 13px;
        }

        .api-config button {
            margin: 5px 0;
            background-color: #e67e22;
        }

        .api-config button:hover {
            background-color: #d35400;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .button-group button {
            flex: 1;
        }

        #next-btn {
            background-color: #27ae60;
            display: none;
        }

        #next-btn:hover {
            background-color: #229954;
        }

        #next-btn:disabled {
            background-color: #cbd5e1;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container" id="app-container">
    <h2>✍️ 英文造句練習 (Gemini AI 檢查版)</h2>
    
    <div id="user-bar" class="user-info-bar">
        <span>👤 學生：<span id="user-email-display">載入中...</span></span>
        <button id="logout-btn" class="btn-logout">登出</button>
    </div>

    <div class="api-config">
        <button id="set-api-key-btn" style="background-color: #9b59b6;">🔐 設定 Gemini API 金鑰</button>
        <span id="api-status" style="font-size: 12px; color: #666;"> 未設定</span>
    </div>
    
    <label for="db-select" style="text-align: left; display: block; font-weight: bold; font-size: 14px; color: #555;">選擇單字分類 (Category)：</label>
    <select id="db-select">
        <option value="">正在從雲端同步分類...</option>
    </select>

    <div class="instruction">
        📝 <strong>練習說明：</strong>請將下方的英文單字使用在您的造句中，完成後點擊「提交檢查」，AI 將檢驗
