<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章句子管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1e293b;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container { 
            max-width: 1200px; 
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 20px;
        }
        
        header h1 {
            font-size: 32px;
            color: #1e293b;
            margin-bottom: 10px;
        }
        
        header p {
            color: #64748b;
            font-size: 16px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        button, .nav-button {
            background-color: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        button:hover, .nav-button:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
            transform: none;
        }
        
        .nav-button {
            background-color: #764ba2;
        }
        
        .nav-button:hover {
            background-color: #6a4590;
        }
        
        .search-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-section input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        table thead {
            background-color: #f1f5f9;
            border-bottom: 2px solid #e2e8f0;
        }
        
        table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: #1e293b;
        }
        
        table td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        table tbody tr:hover {
            background-color: #f8fafc;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .edit-btn, .delete-btn {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            color: white;
            transition: all 0.2s ease;
        }
        
        .edit-btn {
            background-color: #0ea5e9;
        }
        
        .edit-btn:hover {
            background-color: #0284c7;
        }
        
        .delete-btn {
            background-color: #dc2626;
        }
        
        .delete-btn:hover {
            background-color: #b91c1c;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1e293b;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .modal-footer button {
            padding: 10px 20px;
        }
        
        .cancel-btn {
            background-color: #94a3b8;
        }
        
        .cancel-btn:hover {
            background-color: #64748b;
        }
        
        #status {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            white-space: pre-line;
        }
        
        .error {
            background-color: #fee2e2;
            color: #dc2626;
            border: 1px solid #ef4444;
        }
        
        .success {
            background-color: #dcfce7;
            color: #166534;
            border: 1px solid #22c55e;
        }
        
        .info {
            background-color: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }
        
        .empty-message {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 16px;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        
        .pagination button {
            padding: 8px 16px;
            font-size: 13px;
        }
        
        .pagination .active {
            background-color: #667eea;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            
            header h1 {
                font-size: 24px;
            }
            
            .table-wrapper {
                font-size: 12px;
            }
            
            table td, table th {
                padding: 8px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .search-section {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📝 文章句子管理系統</h1>
        <p>查看、編輯、刪除已上傳的文章句子</p>
    </header>

    <div id="status"></div>

    <div class="button-group">
        <button id="refreshBtn">🔄 重新載入</button>
        <a href="menu.html" class="nav-button">← 返回菜單</a>
    </div>

    <div class="search-section">
        <input type="text" id="searchInput" placeholder="搜尋 title、en_text 或 ch_text...">
        <button id="searchBtn">🔍 搜尋</button>
        <button id="clearSearchBtn">清除搜尋</button>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>標題</th>
                    <th>英文文本</th>
                    <th>中文文本</th>
                    <th>序號</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="6" class="empty-message">載入中...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="pagination"></div>
</div>

<!-- 編輯 Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">編輯句子資料</div>
        <div class="form-group">
            <label>標題</label>
            <input type="text" id="editTitle" required>
        </div>
        <div class="form-group">
            <label>英文文本</label>
            <textarea id="editEnText" required></textarea>
        </div>
        <div class="form-group">
            <label>中文文本</label>
            <textarea id="editChText" required></textarea>
        </div>
        <div class="form-group">
            <label>序號</label>
            <input type="number" id="editSeqNum" required>
        </div>
        <div class="modal-footer">
            <button class="cancel-btn" onclick="closeEditModal()">取消</button>
            <button onclick="saveEdit()">保存修改</button>
        </div>
    </div>
</div>

<script>
    // Supabase 初始化
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 全局變數
    let currentData = [];
    let editingId = null;
    const pageSize = 10;
    let currentPage = 1;
    let filteredData = [];

    const statusDiv = document.getElementById('status');
    const refreshBtn = document.getElementById('refreshBtn');
    const searchBtn = document.getElementById('searchBtn');
    const clearSearchBtn = document.getElementById('clearSearchBtn');
    const searchInput = document.getElementById('searchInput');
    const tableBody = document.getElementById('tableBody');
    const editModal = document.getElementById('editModal');

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadData();
        refreshBtn.addEventListener('click', loadData);
        searchBtn.addEventListener('click', performSearch);
        clearSearchBtn.addEventListener('click', clearSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    });

    async function loadData() {
        showStatus('載入中...', 'info');
        try {
            const { data, error } = await supabaseClient
                .from('sentence_practices')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                showStatus(`讀取失敗: ${error.message}`, 'error');
                return;
            }

            currentData = data || [];
            filteredData = currentData;
            currentPage = 1;
            renderTable();
            showStatus(`成功載入 ${currentData.length} 筆資料`, 'success');
        } catch (err) {
            showStatus(`錯誤: ${err.message}`, 'error');
        }
    }

    function performSearch() {
        const keyword = searchInput.value.toLowerCase().trim();
        if (!keyword) {
            filteredData = currentData;
        } else {
            filteredData = currentData.filter(row => 
                (row.title && row.title.toLowerCase().includes(keyword)) ||
                (row.en_text && row.en_text.toLowerCase().includes(keyword)) ||
                (row.zh_text && row.zh_text.toLowerCase().includes(keyword))
            );
        }
        currentPage = 1;
        renderTable();
        showStatus(`找到 ${filteredData.length} 筆符合的資料`, 'info');
    }

    function clearSearch() {
        searchInput.value = '';
        filteredData = currentData;
        currentPage = 1;
        renderTable();
        showStatus(`已清除搜尋，顯示全部 ${currentData.length} 筆資料`, 'info');
    }

    function renderTable() {
        if (filteredData.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="6" class="empty-message">沒有符合的資料</td></tr>';
            renderPagination();
            return;
        }

        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageData = filteredData.slice(start, end);

        tableBody.innerHTML = pageData.map(row => `
            <tr>
                <td>${row.id}</td>
                <td>${row.title || '-'}</td>
                <td>${(row.en_text || '-').substring(0, 50)}...</td>
                <td>${(row.zh_text || '-').substring(0, 50)}...</td>
                <td>${row.seq_num || '-'}</td>
                <td>
                    <div class="action-buttons">
                        <button class="edit-btn" onclick="openEditModal(${row.id})">編輯</button>
                        <button class="delete-btn" onclick="deleteRow(${row.id})">刪除</button>
                    </div>
                </td>
            </tr>
        `).join('');

        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.ceil(filteredData.length / pageSize);
        const pagination = document.getElementById('pagination');
        
        if (totalPages <= 1) {
            pagination.innerHTML = '';
            return;
        }

        let html = '';
        if (currentPage > 1) {
            html += `<button onclick="changePage(1)">第一頁</button>`;
            html += `<button onclick="changePage(${currentPage - 1})">上一頁</button>`;
        }

        for (let i = Math.max(1, currentPage - 2); i <= Math.min(totalPages, currentPage + 2); i++) {
            html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }

        if (currentPage < totalPages) {
            html += `<button onclick="changePage(${currentPage + 1})">下一頁</button>`;
            html += `<button onclick="changePage(${totalPages})">最後一頁</button>`;
        }

        pagination.innerHTML = html;
    }

    function changePage(page) {
        const totalPages = Math.ceil(filteredData.length / pageSize);
        if (page >= 1 && page <= totalPages) {
            currentPage = page;
            renderTable();
            window.scrollTo(0, 0);
        }
    }

    function openEditModal(id) {
        const row = currentData.find(r => r.id === id);
        if (!row) return;

        editingId = id;
        document.getElementById('editTitle').value = row.title || '';
        document.getElementById('editEnText').value = row.en_text || '';
        document.getElementById('editChText').value = row.zh_text || '';
        document.getElementById('editSeqNum').value = row.seq_num || '';
        editModal.style.display = 'block';
    }

    function closeEditModal() {
        editModal.style.display = 'none';
        editingId = null;
    }

    async function saveEdit() {
        const title = document.getElementById('editTitle').value.trim();
        const en_text = document.getElementById('editEnText').value.trim();
        const ch_text = document.getElementById('editChText').value.trim();
        const seq_num = parseInt(document.getElementById('editSeqNum').value);

        if (!title || !en_text || !ch_text || !seq_num) {
            showStatus('所有欄位都是必填的', 'error');
            return;
        }

        try {
            const { error } = await supabaseClient
                .from('sentence_practices')
                .update({
                    title,
                    en_text,
                    zh_text: ch_text,
                    seq_num
                })
                .eq('id', editingId);

            if (error) {
                showStatus(`更新失敗: ${error.message}`, 'error');
                return;
            }

            showStatus('資料已成功更新！', 'success');
            closeEditModal();
            loadData();
        } catch (err) {
            showStatus(`錯誤: ${err.message}`, 'error');
        }
    }

    async function deleteRow(id) {
        if (!confirm('確認要刪除此筆資料嗎？此操作無法復原。')) {
            return;
        }

        try {
            const { error } = await supabaseClient
                .from('sentence_practices')
                .delete()
                .eq('id', id);

            if (error) {
                showStatus(`刪除失敗: ${error.message}`, 'error');
                return;
            }

            showStatus('資料已成功刪除！', 'success');
            loadData();
        } catch (err) {
            showStatus(`錯誤: ${err.message}`, 'error');
        }
    }

    function showStatus(msg, type) {
        statusDiv.innerText = msg;
        statusDiv.className = type;
        statusDiv.style.display = 'block';
        if (type !== 'error') {
            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
    }

    // 關閉 Modal 當點擊外部時
    window.onclick = (event) => {
        if (event.target == editModal) {
            closeEditModal();
        }
    };
</script>

</body>
</html>
