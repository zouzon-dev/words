<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文文章句子跟讀練習</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ec4b6;
            --recording-color: #e63946;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            background-color: #fff;
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            cursor: pointer;
            min-height: 44px;
            box-sizing: border-box;
        }

        input {
            appearance: auto;
            -webkit-appearance: auto;
            -moz-appearance: auto;
            cursor: text;
        }

        select {
            /* 加入自訂的下拉箭頭背景，解決手機版看不出是選單的問題 */
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%27%23333%27%20d%3D%27M287%2069.4a17.6%2017.6%200%200%200-13-5.6H18.4c-5%200-9.3%201.8-12.9%205.6A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.6%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%27%3E%3C%2Fpath%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
            padding-right: 40px; /* 避免文字與箭頭重疊 */
        }

        /* 準確度選擇面板 */
        .accuracy-selector {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: left;
        }

        .accuracy-selector label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .accuracy-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .accuracy-btn {
            padding: 8px 16px;
            border: 2px solid #cbd5e1;
            background-color: white;
            color: #333;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.2s;
        }

        .accuracy-btn:hover {
            border-color: #3498db;
            background-color: #e3f2fd;
        }

        .accuracy-btn.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }

        .accuracy-info {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* 句子範圍選擇器 */
        .sentence-range-group {
            background: #f0f4f8;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: left;
        }

        .sentence-range-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
            font-size: 14px;
        }

        .range-inputs {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .range-inputs input {
            flex: 1;
            width: 100%;
        }

        .range-inputs span {
            color: #555;
            font-weight: bold;
        }

        .range-info {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 8px;
        }

        .practice-card {
            border: 2px solid #eef2f7;
            border-radius: 10px;
            padding: 25px;
            margin-top: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: #fff;
        }
        .progress {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        .en-text {
            font-size: 22px;
            font-weight: 600;
            color: #2b2d42;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .zh-text {
            font-size: 16px;
            color: #6c757d;
            margin-bottom: 25px;
        }
        .user-result {
            font-size: 16px;
            font-style: italic;
            color: #8d99ae;
            min-height: 24px;
            margin-bottom: 20px;
            padding: 8px;
            background: #f1f3f5;
            border-radius: 4px;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .btn-record {
            background-color: var(--success-color);
        }
        .btn-record.recording {
            background-color: var(--recording-color);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .hidden {
            display: none !important;
        }

        .result {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎧 英文句子跟讀練習</h1>
    
    <div class="form-group">
        <label for="titleSelect">選擇文章標題：</label>
        <select id="titleSelect">
            <option value="">-- 請選擇文章 --</option>
        </select>
    </div>

    <div id="sentenceRangePanel" class="sentence-range-group hidden">
        <label>📍 選擇練習句子範圍（可選）：</label>
        <div class="range-inputs">
            <input type="number" id="startSentence" placeholder="開始" min="1" value="1">
            <span>-</span>
            <input type="number" id="endSentence" placeholder="結束" min="1">
        </div>
        <div class="range-info">💡 留空表示全部句子。例如：輸入 1-5 表示只練習第 1 到第 5 句</div>
    </div>

    <div id="accuracyPanel" class="accuracy-selector hidden">
        <label>🎯 選擇口說正確率門檻：</label>
        <div class="accuracy-buttons">
            <button type="button" class="accuracy-btn" data-accuracy="100">💯 完美 (100%)</button>
            <button type="button" class="accuracy-btn" data-accuracy="90">⭐ 優秀 (90%)</button>
            <button type="button" class="accuracy-btn" data-accuracy="80">👍 良好 (80%)</button>
            <button type="button" class="accuracy-btn active" data-accuracy="60">🆗 基礎 (60%)</button>
        </div>
        <div class="accuracy-info">💡 選擇難度越高，對口說發音的要求越嚴格</div>
    </div>

    <div id="practiceArea" class="practice-card hidden">
        <div>
            <div class="progress" id="progressText">句子：0 / 0</div>
            <div class="en-text" id="enText">Loading...</div>
            <div class="zh-text" id="zhText">Loading...</div>
        </div>

        <div>
            <div class="user-result" id="userResult">正在載入句子並自動發音...</div>
            <div class="result" id="resultMsg"></div>
            
            <button class="btn" id="playBtn">🔊 重新播放</button>
            <button class="btn btn-record" id="recordBtn" disabled>🎤 開始口說</button>
        </div>
    </div>
</div>

<script>
    // 1. 初始化 Supabase
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2. DOM 元素獲取
    const titleSelect = document.getElementById('titleSelect');
    const sentenceRangePanel = document.getElementById('sentenceRangePanel');
    const startSentenceInput = document.getElementById('startSentence');
    const endSentenceInput = document.getElementById('endSentence');
    const accuracyPanel = document.getElementById('accuracyPanel');
    const practiceArea = document.getElementById('practiceArea');
    const progressText = document.getElementById('progressText');
    const enText = document.getElementById('enText');
    const zhText = document.getElementById('zhText');
    const userResult = document.getElementById('userResult');
    const resultMsg = document.getElementById('resultMsg');
    const playBtn = document.getElementById('playBtn');
    const recordBtn = document.getElementById('recordBtn');

    // 3. 全域變數控制
    let currentSentences = [];
    let currentIndex = 0;
    let accuracyThreshold = 0.6; // 預設 60%
    let isLocking = false;
    let displaySentences = []; // 用於存儲篩選後的句子範圍
    let rangeStartIndex = 0;   // 範圍內的起始索引
    
    // 瀏覽器語音 API 宣告
    const synth = window.speechSynthesis;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; // 設定辨識語言為英文
        recognition.interimResults = false; // 是否需要即時回傳未定案結果
        recognition.maxAlternatives = 1;
    } else {
        alert('您的瀏覽器不支援語音辨識功能 (Speech Recognition)，建議使用 Google Chrome。');
    }

    // 4. 初始化：載入不重複的文章標題 (Titles)
    async function loadTitles() {
        try {
            // 從 database 撈取獨特的 title 列表
            const { data, error } = await _supabase
                .from('sentence_practices')
                .select('title');
            
            if (error) throw error;

            // 過濾重複的 title
            const uniqueTitles = [...new Set(data.map(item => item.title))];
            
            uniqueTitles.forEach(title => {
                const option = document.createElement('option');
                option.value = title;
                option.textContent = title;
                titleSelect.appendChild(option);
            });
        } catch (err) {
            console.error('載入標題失敗:', err.message);
            alert('無法從資料庫取得文章列表，請檢查 Supabase 連線或 RLS 設定。');
        }
    }

    // 4.5. 應用句子範圍篩選
    function applySentenceRange() {
        const startInput = parseInt(startSentenceInput.value) || 1;
        const endInput = parseInt(endSentenceInput.value) || currentSentences.length;
        
        // 驗證範圍
        const start = Math.max(1, Math.min(startInput, currentSentences.length));
        const end = Math.max(start, Math.min(endInput, currentSentences.length));
        
        // 更新輸入框
        startSentenceInput.value = start;
        endSentenceInput.value = end;
        
        // 篩選句子
        displaySentences = currentSentences.slice(start - 1, end);
        rangeStartIndex = start - 1;
        
        return displaySentences;
    }

    // 5. 監聽下拉選單：切換文章
    titleSelect.addEventListener('change', async (e) => {
        const selectedTitle = e.target.value;
        if (!selectedTitle) {
            practiceArea.classList.add('hidden');
            accuracyPanel.classList.add('hidden');
            sentenceRangePanel.classList.add('hidden');
            return;
        }

        try {
            // 根據選擇的 title 撈取句子，並依 seq_num 排序
            const { data, error } = await _supabase
                .from('sentence_practices')
                .select('*')
                .eq('title', selectedTitle)
                .order('seq_num', { ascending: true });

            if (error) throw error;

            if (data && data.length > 0) {
                currentSentences = data;
                
                // 設定範圍輸入框的最大值
                endSentenceInput.max = data.length;
                endSentenceInput.value = data.length;
                startSentenceInput.max = data.length;
                
                // 應用範圍篩選
                applySentenceRange();
                
                currentIndex = 0;
                isLocking = false;
                sentenceRangePanel.classList.remove('hidden');
                accuracyPanel.classList.remove('hidden');
                practiceArea.classList.remove('hidden');
                showSentence(currentIndex);
            } else {
                alert('該文章內無句子資料。');
            }
        } catch (err) {
            console.error('載入句子失敗:', err.message);
        }
    });

    // 5.5. 監聽句子範圍輸入
    function bindRangeInputs() {
        startSentenceInput.addEventListener('change', () => {
            applySentenceRange();
            currentIndex = 0;
            isLocking = false;
            showSentence(currentIndex);
        });

        endSentenceInput.addEventListener('change', () => {
            applySentenceRange();
            currentIndex = 0;
            isLocking = false;
            showSentence(currentIndex);
        });
    }

    // 6. 準確度按鈕綁定
    function bindAccuracyButtons() {
        const accuracyButtons = document.querySelectorAll('.accuracy-btn');
        accuracyButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 移除所有 active 類
                accuracyButtons.forEach(b => b.classList.remove('active'));
                // 添加 active 類到點擊的按鈕
                e.target.classList.add('active');
                // 更新門檻
                accuracyThreshold = parseInt(e.target.getAttribute('data-accuracy')) / 100;
            });
        });
    }

    // 7. 渲染當前句子
    function showSentence(index) {
        if (index >= displaySentences.length) {
            alert('🎉 恭喜！您已完成選定範圍的所有句子跟讀！');
            titleSelect.value = "";
            practiceArea.classList.add('hidden');
            accuracyPanel.classList.add('hidden');
            sentenceRangePanel.classList.add('hidden');
            return;
        }

        const current = displaySentences[index];
        const actualIndex = rangeStartIndex + index + 1; // 實際的句子編號
        progressText.textContent = `句子：${actualIndex} / ${rangeStartIndex + displaySentences.length}`;
        enText.textContent = current.en_text;
        zhText.textContent = current.zh_text;
        userResult.textContent = "正在自動發音...請耐心聆聽。";
        resultMsg.textContent = "";
        
        // 重置按鈕狀態
        recordBtn.disabled = true;
        recordBtn.classList.remove('recording');
        recordBtn.textContent = '🎤 開始口說';
        
        // 自動播放發音
        autoPlaySentence();
    }

    // 7.5. 自動播放句子發音
    function autoPlaySentence() {
        // 確保沒有正在進行的語音
        if (synth.speaking) {
            synth.cancel();
        }

        const utterance = new UtteranceVoice(enText.textContent);
        
        utterance.onend = () => {
            // 播放完畢後，允許使用者點擊口說
            recordBtn.disabled = false;
            userResult.textContent = "聆聽完畢，請點擊「🎤 開始口說」並跟讀。";
        };

        utterance.onerror = () => {
            recordBtn.disabled = false;
            userResult.textContent = "發音出錯，請點擊「🔊 重新播放」重試。";
        };

        synth.speak(utterance);
    }

    // 8. 英文句子發音 (TTS) - 手動重新播放
    playBtn.addEventListener('click', () => {
        if (synth.speaking) {
            synth.cancel(); // 如果正在播放，先停止
        }

        const utterance = new UtteranceVoice(enText.textContent);
        
        utterance.onend = () => {
            // 播放完畢後，允許使用者點擊口說
            recordBtn.disabled = false;
            userResult.textContent = "聆聽完畢，請點擊「🎤 開始口說」並跟讀。";
        };

        utterance.onerror = () => {
            recordBtn.disabled = false;
        };

        synth.speak(utterance);
    });

    // 封裝語音設定，確保發音為英文
    function UtteranceVoice(text) {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'en-US';
        u.rate = 0.85; // 速度稍慢便於學習聽講
        // 嘗試尋找原生英文語音(非必選，瀏覽器會自動偵測 lang)
        const voices = synth.getVoices();
        const enVoice = voices.find(v => v.lang.includes('en'));
        if (enVoice) u.voice = enVoice;
        return u;
    }

    // 9. 語音辨識 (STT) 處理
    if (recognition) {
        recordBtn.addEventListener('click', () => {
            // 如果已經在錄音，則手動停止
            if (recordBtn.classList.contains('recording')) {
                recognition.stop();
                return;
            }

            userResult.textContent = "正在聆聽您的聲音...請開始朗讀。";
            resultMsg.textContent = "";
            recordBtn.classList.add('recording');
            recordBtn.textContent = '🛑 結束辨識';
            recognition.start();
        });

        // 辨識成功回傳結果
        recognition.onresult = (event) => {
            const speechToText = event.results[0][0].transcript;
            userResult.textContent = `你說的是："${speechToText}"`;
            
            // 檢查口說內容是否符合準確度門檻
            checkSpeakingInput(speechToText);
        };

        // 辨識結束 (無論成功或失敗都會觸發)
        recognition.onend = () => {
            recordBtn.classList.remove('recording');
            recordBtn.textContent = '🎤 開始口說';
        };

        // 錯誤處理
        recognition.onerror = (event) => {
            console.error('語音辨識錯誤:', event.error);
            if (event.error === 'no-speech') {
                resultMsg.textContent = "❌ 沒有偵測到聲音，請再試一次。";
                resultMsg.className = "result error";
            } else {
                resultMsg.textContent = `❌ 辨識出錯: ${event.error}`;
                resultMsg.className = "result error";
            }
        };
    }

    // 10. 比對口說結果
    function checkSpeakingInput(userSpoken) {
        if (isLocking || currentIndex >= displaySentences.length) return;

        const currentData = displaySentences[currentIndex];
        const targetText = currentData.en_text;

        // 進行文本標準化（轉小寫、去除常見標點符號、前後空白）
        const normalizedUser = cleanText(userSpoken);
        const normalizedTarget = cleanText(targetText);

        // 計算相似度百分比
        const similarity = getSimilarity(normalizedUser, normalizedTarget);
        const accuracyPercent = Math.round(similarity * 100);

        // 根據選擇的門檻進行檢查
        if (similarity >= accuracyThreshold) {
            isLocking = true;
            resultMsg.textContent = `🎯 太棒了！發音正確率達 ${accuracyPercent}%！`;
            resultMsg.className = "result success";
            
            // 慶祝音效提示過關
            synth.cancel();
            const celebration = new UtteranceVoice("Good job!");
            celebration.onend = () => {
                currentIndex++;
                isLocking = false;
                showSentence(currentIndex);
            };
            synth.speak(celebration);
            
        } else {
            resultMsg.textContent = `❌ 聽起來不太像喔 (正確率: ${accuracyPercent}%)，請再試著念一次！`;
            resultMsg.className = "result error";
        }
    }

    // 11. 格式化字串：移除標點符號
    function cleanText(str) {
        return str.toLowerCase()
                  .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g, "")
                  .replace(/\s+/g, " ")
                  .trim();
    }

    // 12. 核心演算法：計算兩個字串的字元相似度 (Levenshtein Distance)
    function getSimilarity(s1, s2) {
        const len1 = s1.length;
        const len2 = s2.length;
        const maxLen = Math.max(len1, len2);
        if (maxLen === 0) return 1.0;

        // 初始化動態規劃矩陣
        const dp = Array(len1 + 1).fill(null).map(() => Array(len2 + 1).fill(0));
        for (let i = 0; i <= len1; i++) dp[i][0] = i;
        for (let j = 0; j <= len2; j++) dp[0][j] = j;

        for (let i = 1; i <= len1; i++) {
            for (let j = 1; j <= len2; j++) {
                if (s1[i - 1] === s2[j - 1]) {
                    dp[i][j] = dp[i - 1][j - 1];
                } else {
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1,    // 刪除
                        dp[i][j - 1] + 1,    // 插入
                        dp[i - 1][j - 1] + 1 // 替換
                    );
                }
            }
        }
        // 回傳 0.0 ~ 1.0 之間的相似度比例
        return (maxLen - dp[len1][len2]) / maxLen;
    }

    // 13. 初始化
    document.addEventListener('DOMContentLoaded', () => {
        loadTitles();
        bindAccuracyButtons();
        bindRangeInputs();
    });
