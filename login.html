<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 英文單字測驗系統</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 讓登入框置中 */
            box-sizing: border-box;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 { margin-top: 0; color: #1a1a1a; border-bottom: 2px solid #eaeaea; padding-bottom: 10px; text-align: center; }
        
        .login-box { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        input[type="email"], input[type="password"] {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }
        input[type="email"]:focus, input[type="password"]:focus { border-color: #3498db; }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #2980b9; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <h2>📝 測驗系統登入</h2>
    
    <div class="login-box">
        <p style="color: #64748b; margin: 0; font-size: 14px;">請使用學生帳號密碼登入：</p>
        <input type="email" id="login-email" placeholder="學生信箱 Email">
        <input type="password" id="login-password" placeholder="密碼">
        <button id="login-btn">登入測驗系統</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    let supabaseClient = null;

    window.onload = async function() {
        if (typeof window.supabase === 'undefined') {
            alert("⚠️ 系統載入失敗！請檢查網路或關閉瀏覽器的防追蹤功能。");
            return;
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // 綁定事件
        document.getElementById('login-btn').addEventListener('click', handleLogin);
        document.getElementById('login-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        // 檢查是否已經登入過，若已登入則直接跳轉到主程式
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user) {
            window.location.href = 'menu.html';
        }
    };

    async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const btn = document.getElementById('login-btn');

        if(!email || !password) { alert("請填寫帳號密碼！"); return; }

        btn.disabled = true;
        btn.innerText = "登入中...";

        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if(error) {
            alert(`登入失敗：${error.message}`);
            btn.disabled = false;
            btn.innerText = "登入測驗系統";
        } else {
            // 登入成功，跳轉到主程式
            window.location.href = 'menu.html';
        }
    }
</script>

</body>
</html>
