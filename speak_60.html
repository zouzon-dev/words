<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字與句子口說練習器 (雲端辨識版)</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* 初始隱藏主視窗，確認登入後才顯示 */
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
            display: none; 
        }
        
        .user-info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #e2e8f0;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .btn-logout { background-color: #ef4444; padding: 4px 10px; font-size: 12px; color: white; border: none; border-radius: 4px; cursor: pointer;}
        .btn-logout:hover { background-color: #dc2626; }

        select, button {
            font-size: 16px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #45a049; }
        button:disabled { background-color: #cbd5e1; cursor: not-allowed; }

        .word-display {
            font-size: 38px;
            font-weight: bold;
            color: #2c3e50;
            margin: 15px 0 5px 0;
        }
        .ch-display {
            font-size: 22px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        
        /* 英文句子容器區塊 */
        .sentence-container {
            background-color: #f8fafc;
            border-left: 4px solid #3498db;
            padding: 15px;
            margin: 20px 0;
            border-radius: 0 6px 6px 0;
            text-align: left;
        }
        .sentence-en {
            font-size: 20px;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .sentence-ch {
            font-size: 16px;
            color: #7f8c8d;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .audio-btn {
            background-color: #008CBA;
            margin: 0;
            flex: 1;
            min-width: 130px;
        }
        .audio-btn:hover { background-color: #007B9A; }
        
        /* 口說錄音專用面板 */
        .speak-panel {
            background-color: #f0fdf4;
            border: 2px dashed #4ade80;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        .mic-btn {
            background-color: #2ecc71;
            font-size: 18px;
            padding: 12px;
            margin: 0 0 10px 0;
        }
        .mic-btn:hover { background-color: #27ae60; }
        .mic-btn.recording {
            background-color: #ef4444;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .recognized-box {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 12px;
            border-radius: 6px;
            min-height: 36px;
            font-size: 16px;
            color: #475569;
            font-style: italic;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .progress-text {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 10px;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
        
        .summary-title {
            font-size: 28px;
            color: #27ae60;
            margin-bottom: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container" id="app-container">
    <h2>🗣️ 英文單字與句子口說練習 (雲端連線版)</h2>
    
    <div id="user-bar" class="user-info-bar">
        <span>👤 學生：<span id="user-email-display">載入中...</span></span>
        <button id="logout-btn" class="btn-logout">登出</button>
    </div>
    
    <label for="db-select" style="text-align: left; display: block; font-weight: bold; font-size: 14px; color: #555;">選擇單字分類 (Category)：</label>
    <select id="db-select">
        <option value="">正在從雲端同步分類...</option>
    </select>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div id="exercise-section">
        <div class="progress-text" id="progress-bar">進度: 0 / 0</div>

        <div class="word-display" id="en-word">Loading...</div>
        <div class="ch-display" id="ch-word">載入中...</div>
        
        <div class="sentence-container" id="sentence-section">
            <div style="font-size: 12px; color: #3498db; font-weight: bold; margin-bottom: 4px;">💡 請口說唸出此英文句子：</div>
            <div class="sentence-en" id="sentence-en">載入中...</div>
            <div class="sentence-ch" id="sentence-ch">載入中...</div>
        </div>
        
        <div class="btn-group">
            <button class="audio-btn" id="speak-en-btn" disabled>🔊 單字讀音 (Enter)</button>
            <button class="audio-btn" id="speak-sent-btn" style="background-color: #34495e;" disabled>🔊 句子讀音 (Shift)</button>
            <button class="audio-btn" id="speak-ch-btn" style="background-color: #9b59b6;" disabled>🔊 中文翻譯</button>
        </div>
        
        <div class="speak-panel">
            <button class="mic-btn" id="mic-btn" disabled>🎤 點擊或按 [空白鍵] 開始口說</button>
            <div class="recognized-box" id="recognized-text">尚未開始辨識...</div>
        </div>
        
        <div class="result" id="result-msg"></div>
    </div>
</div>

<script>
    // Supabase 設定
    const SUPABASE_URL = 'https://phwecknpfeewbtwwmhik.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Q5qLW7iV1QdlJRTcJLRaig_B4sMfP-P';
    
    let supabaseClient = null;
    let currentUser = null;
    let wordList = [];
    let currentIndex = 0;
    let isLocking = false; 

    // 語音辨識變數
    let recognition = null;
    let isListening = false;

    const appContainer = document.getElementById('app-container');
    const dbSelect = document.getElementById('db-select');
    const progressBar = document.getElementById('progress-bar');
    const enWord = document.getElementById('en-word');
    const chWord = document.getElementById('ch-word');
    const sentenceSection = document.getElementById('sentence-section');
    const sentenceEn = document.getElementById('sentence-en');
    const sentenceCh = document.getElementById('sentence-ch');
    
    const speakEnBtn = document.getElementById('speak-en-btn');
    const speakSentBtn = document.getElementById('speak-sent-btn');
    const speakChBtn = document.getElementById('speak-ch-btn');
    
    const micBtn = document.getElementById('mic-btn');
    const recognizedTextDisplay = document.getElementById('recognized-text');
    const resultMsg = document.getElementById('result-msg');

    window.onload = async function() {
        if (typeof window.supabase === 'undefined') {
            alert("⚠️ 系統載入失敗！您的瀏覽器攔截了資料庫連線。");
            return;
        }

        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 檢查使用者登入狀態
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session && session.user) {
            currentUser = session.user;
            document.getElementById('user-email-display').innerText = currentUser.email;
            appContainer.style.display = 'block';
            
            initSpeechRecognition();
            bindEvents();
            await loadCategoriesFromSupabase();
        } else {
            window.location.href = 'login.html';
        }
    };

    // 初始化瀏覽器語音辨識
    function initSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("⚠️ 您的瀏覽器不支援 Web Speech API 語音辨識，請使用 Google Chrome 瀏覽器進行口說練習。");
            return;
        }
        
        recognition = new SpeechRecognition();
        recognition.continuous = false;     // 單次辨識
        recognition.interimResults = false;   // 只接收最終結果
        recognition.lang = 'en-US';          // 設定辨識語系為英文

        recognition.onstart = () => {
            isListening = true;
            micBtn.textContent = "🛑 正在聆聽，請開始朗讀句子...";
            micBtn.classList.add('recording');
        };

        recognition.onend = () => {
            isListening = false;
            micBtn.textContent = "🎤 點擊或按 [空白鍵] 開始口說";
            micBtn.classList.remove('recording');
        };

        recognition.onresult = (event) => {
            const resultText = event.results[0][0].transcript;
            recognizedTextDisplay.textContent = `聽到的內容："${resultText}"`;
            checkSpeakingInput(resultText);
        };

        recognition.onerror = (event) => {
            console.error("語音辨識錯誤:", event.error);
            if (event.error === 'no-speech') {
                resultMsg.textContent = "❌ 沒有偵測到聲音，請再試一次。";
                resultMsg.className = "result error";
            } else {
                resultMsg.textContent = `❌ 辨識出錯 (${event.error})，請重新嘗試。`;
                resultMsg.className = "result error";
            }
        };
    }

    function bindEvents() {
        document.getElementById('logout-btn').addEventListener('click', handleLogout);
        dbSelect.addEventListener('change', loadWordsFromSupabase);
        
        // 語音播放綁定
        speakEnBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            if(wordList[currentIndex]) speak(wordList[currentIndex].en, 'en-US');
        });

        speakSentBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            if(wordList[currentIndex]) {
                const targetText = wordList[currentIndex].sentence_en || wordList[currentIndex].en;
                speak(targetText, 'en-US');
            }
        });

        speakChBtn.addEventListener('click', () => {
            window.speechSynthesis.cancel();
            if(wordList[currentIndex]) {
                const targetCh = wordList[currentIndex].sentence_ch || wordList[currentIndex].ch;
                speak(targetCh, 'zh-TW');
            }
        });

        // 麥克風點擊按鈕
        micBtn.addEventListener('click', toggleListening);

        // 鍵盤快捷鍵支援
        window.addEventListener('keydown', (e) => {
            if (currentIndex >= wordList.length || isLocking) return;

            // 1. Enter 鍵：重複播放單字發
