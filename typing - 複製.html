<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字打字練習器 (中英發音版)</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        select, input, button {
            font-size: 16px;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        .word-display {
            font-size: 36px;
            font-weight: bold;
            color: #2c3e50;
            margin: 15px 0 5px 0;
        }
        .ch-display {
            font-size: 22px;
            color: #7f8c8d;
            margin-bottom: 5px;
        }
        .hint-display {
            font-size: 16px;
            color: #bdc3c7;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .audio-btn {
            background-color: #008CBA;
            margin: 0;
        }
        .audio-btn:hover {
            background-color: #007B9A;
        }
        .progress-text {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 10px;
        }
        .result {
            font-size: 18px;
            font-weight: bold;
            margin-top: 15px;
            min-height: 27px;
        }
        .success { color: #27ae60; }
        .error { color: #c0392b; }
        
        /* 結算畫面樣式 */
        .summary-title {
            font-size: 28px;
            color: #27ae60;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <h2>⌨️ 英文單字練習 (中英雙語發音)</h2>
    
    <!-- 選擇資料庫 -->
    <label for="data-select" style="text-align: left; display: block; font-weight: bold; font-size: 14px; color: #555;">選擇單字庫：</label>
    <select id="data-select">
        <option value="data1.json">單字庫 1 (data1.json)</option>
        <option value="data2.json">單字庫 2 (data2.json)</option>
        <option value="data3.json">單字庫 3 (data3.json)</option>
    </select>
    
    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <!-- 進度條文字 -->
    <div class="progress-text" id="progress-bar">進度: 0 / 0</div>

    <!-- 單字顯示區 -->
    <div class="word-display" id="en-word">Loading...</div>
    <div class="ch-display" id="ch-word">載入中...</div>
    <div class="hint-display" id="hint-word">提示</div>
    
    <!-- 發音按鈕組 -->
    <div class="btn-group">
        <button class="audio-btn" id="speak-en-btn" disabled>🔊 英文發音 (Enter)</button>
        <button class="audio-btn" id="speak-ch-btn" style="background-color: #9b59b6;" disabled>🔊 中文發音</button>
    </div>
    
    <!-- 打字輸入區 -->
    <input type="text" id="type-input" placeholder="請照著上面的英文輸入..." autocomplete="off" disabled>
    
    <div class="result" id="result-msg"></div>
</div>

<script>
    let wordList = [];
    let currentIndex = 0;

    const mainCard = document.getElementById('main-card');
    const dataSelect = document.getElementById('data-select');
    const progressBar = document.getElementById('progress-bar');
    const enWord = document.getElementById('en-word');
    const chWord = document.getElementById('ch-word');
    const hintWord = document.getElementById('hint-word');
    const typeInput = document.getElementById('type-input');
    const speakEnBtn = document.getElementById('speak-en-btn');
    const speakChBtn = document.getElementById('speak-ch-btn');
    const resultMsg = document.getElementById('result-msg');

    // 初始化自動載入
    loadData(dataSelect.value);

    // 切換選單
    dataSelect.addEventListener('change', (e) => {
        loadData(e.target.value);
    });

    // 讀取外部 JSON
    async function loadData(fileName) {
        try {
            const response = await fetch(fileName);
            if (!response.ok) throw new Error('檔案讀取失敗');
            wordList = await response.json();
            
            if (wordList.length > 0) {
                currentIndex = 0;
                // 還原可能被隱藏或鎖定的介面
                typeInput.disabled = false;
                speakEnBtn.disabled = false;
                speakChBtn.disabled = false;
                showWord();
            } else {
                alert('JSON 檔案內沒有資料');
            }
        } catch (error) {
            enWord.textContent = "錯誤";
            chWord.textContent = "無法讀取 " + fileName;
            hintWord.textContent = "請確認檔案是否存在並使用伺服器環境開啟網頁";
            typeInput.disabled = true;
            speakEnBtn.disabled = true;
            speakChBtn.disabled = true;
            console.error(error);
        }
    }

    // 顯示題目
    function showWord() {
        const currentData = wordList[currentIndex];
        
        // 更新進度顯示
        progressBar.textContent = `進度: ${currentIndex + 1} / ${wordList.length}`;
        
        enWord.textContent = currentData.en;     
        chWord.textContent = currentData.ch;     
        hintWord.textContent = `( 提示: ${currentData.hint} )`; 
        
        typeInput.value = '';                    
        resultMsg.textContent = '';              
        typeInput.focus();
        
        // 新單字進場時：先念英文，再念中文
        speak(currentData.en, 'en-US', () => {
            speak(currentData.ch, 'zh-TW');
        });
    }

    // 瀏覽器原生發音功能，支援回呼函式（語音播完後要做的事）
    function speak(text, lang, onEndCallback = null) {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;        // 'en-US' 或 'zh-TW'
            utterance.rate = 0.9;         // 語速
            
            if (onEndCallback) {
                utterance.onend = onEndCallback;
            }
            
            window.speechSynthesis.speak(utterance);
        }
    }

    // 手動點擊英文/中文發音
    speakEnBtn.addEventListener('click', () => {
        window.speechSynthesis.cancel(); // 停止目前所有發音
        speak(wordList[currentIndex].en, 'en-US');
        typeInput.focus();
    });

    speakChBtn.addEventListener('click', () => {
        window.speechSynthesis.cancel();
        speak(wordList[currentIndex].ch, 'zh-TW');
        typeInput.focus();
    });

    // 檢查打字輸入
    typeInput.addEventListener('input', (e) => {
        const userTyped = e.target.value.trim();
        const correctWord = wordList[currentIndex].en;

        if (userTyped === correctWord) {
            resultMsg.textContent = "🎯 太棒了，完全正確！";
            resultMsg.className = "result success";
            typeInput.disabled = true; // 暫時鎖定防止連續輸入
            
            // 延遲 1.2 秒自動換題或結束
            setTimeout(() => {
                currentIndex++;
                
                // 判斷是否已經打完所有單字
                if (currentIndex < wordList.length) {
                    typeInput.disabled = false;
                    showWord();
                } else {
                    endSession();
                }
            }, 1200);
            
        } else if (correctWord.startsWith(userTyped)) {
            resultMsg.textContent = "輸入中...";
            resultMsg.className = "result";
        } else {
            resultMsg.textContent = "❌ 哎呀，拼錯囉！";
            resultMsg.className = "result error";
        }
    });

    // 結束練習的畫面渲染
    function endSession() {
        window.speechSynthesis.cancel();
        // 播放過關音效（用語音代替）
        speak("恭喜你，完成所有單字練習！", "zh-TW");

        mainCard.innerHTML = `
            <div class="summary-title">🎉 練習結束！</div>
            <p style="font-size: 18px; color: #555;">你已經成功挑戰了這個字庫的所有單字！</p>
            <div style="font-size: 48px; margin: 20px 0;">🏆</div>
            <button onclick="location.reload()" style="background-color: #3498db; margin-top: 20px;">再練習一次</button>
        `;
    }

    // 快捷鍵：按 Enter 鍵重複發英文音
    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && currentIndex < wordList.length) {
            window.speechSynthesis.cancel();
            speak(wordList[currentIndex].en, 'en-US');
        }
    });
</script>

</body>
</html>
